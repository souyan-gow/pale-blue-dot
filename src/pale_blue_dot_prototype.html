<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALE BLUE DOT — A Journey Through the Solar System</title>
<meta name="description" content="太陽系から隣の星系まで旅するブラウザゲーム。失敗も敵もない、ただ旅をして、帰ってくる。">
<meta property="og:title" content="PALE BLUE DOT">
<meta property="og:description" content="太陽系から隣の星系まで旅するブラウザゲーム。カール・セーガンの言葉を胸に、宇宙を旅しよう。">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="PALE BLUE DOT">
<meta name="twitter:description" content="太陽系から隣の星系まで旅するブラウザゲーム。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23000'/><circle cx='16' cy='16' r='3' fill='%234fc3f7'/><circle cx='16' cy='16' r='5' fill='none' stroke='%234fc3f7' stroke-width='0.5' opacity='0.4'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;color:#e0eaff;user-select:none}
#c{display:block;position:fixed;top:0;left:0;width:100%;height:100%}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud-top{position:absolute;top:0;left:0;right:0;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent)}
#title-block{pointer-events:none}
#game-title{font-size:15px;letter-spacing:.22em;color:#4fc3f7;font-weight:bold}
#game-sub{font-size:10px;color:#446;letter-spacing:.12em;margin-top:2px}
#nav-info{text-align:right;font-size:11px;color:#8ab;line-height:1.8;font-family:'Courier New',monospace}
#hud-bottom{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent)}
#controls-row{display:flex;align-items:center;gap:16px;pointer-events:all;flex-wrap:wrap}
.ctrl-label{font-size:10px;color:#446;letter-spacing:.08em}
#speed-range{-webkit-appearance:none;width:100px;height:2px;background:linear-gradient(90deg,#4fc3f7,#112);border-radius:2px}
#speed-range::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#4fc3f7;cursor:pointer;box-shadow:0 0 6px #4fc3f7}
.hud-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(79,195,247,.4);background:rgba(0,10,30,.6);color:#4fc3f7;font-size:11px;cursor:pointer;letter-spacing:.08em;transition:all .2s;backdrop-filter:blur(4px)}
.hud-btn:hover{background:rgba(79,195,247,.15);border-color:#4fc3f7}
.hud-btn.active{background:rgba(79,195,247,.25);border-color:#4fc3f7;box-shadow:0 0 12px rgba(79,195,247,.3)}
#photo-count{color:#c9a227;font-size:11px;letter-spacing:.06em}

/* ── DESTINATION MENU ── */
#dest-menu{position:fixed;left:24px;top:50%;transform:translateY(-50%);z-index:15;display:none;flex-direction:column;gap:6px;pointer-events:all}
#dest-menu.show{display:flex}
.dest-btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(79,195,247,.3);background:rgba(0,8,22,.8);color:#b0c8e8;font-size:12px;cursor:pointer;letter-spacing:.06em;transition:all .2s;backdrop-filter:blur(6px);text-align:left;white-space:nowrap}
.dest-btn:hover{background:rgba(79,195,247,.18);color:#fff;border-color:#4fc3f7}
.dest-btn.current{color:#4fc3f7;border-color:rgba(79,195,247,.6)}
.dest-btn.far{color:#8ab;opacity:.6}
#dest-title{font-size:10px;color:#446;letter-spacing:.12em;margin-bottom:4px;padding-left:4px}

/* ── INFO PANEL ── */
#info-panel{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:50;width:260px;background:rgba(3,8,22,.92);border:1px solid rgba(79,195,247,.2);border-radius:14px;padding:20px 18px;display:none;backdrop-filter:blur(12px)}
#info-panel.show{display:block}
#info-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#446;font-size:16px;cursor:pointer;pointer-events:all}
#info-close:hover{color:#fff}
#info-dot{width:48px;height:48px;border-radius:50%;margin:0 auto 10px}
#info-name-en{font-size:10px;letter-spacing:.18em;color:#446;text-align:center}
#info-name-ja{font-size:20px;text-align:center;margin-bottom:12px;color:#fff}
.info-fact{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px}
.info-fact:last-child{border-bottom:none}
.info-fk{color:#557}.info-fv{color:#4fc3f7;font-family:monospace}
#travel-btn{display:block;width:100%;margin-top:14px;padding:9px;background:linear-gradient(135deg,rgba(79,195,247,.18),rgba(79,195,247,.04));border:1px solid rgba(79,195,247,.45);border-radius:8px;color:#4fc3f7;font-size:12px;letter-spacing:.08em;cursor:pointer;transition:all .2s;text-align:center;pointer-events:all}
#travel-btn:hover{background:rgba(79,195,247,.25);box-shadow:0 0 16px rgba(79,195,247,.25)}

/* ── ALBUM ── */
#album{position:fixed;inset:0;z-index:30;background:rgba(0,4,16,.95);display:none;flex-direction:column;backdrop-filter:blur(8px)}
#album.show{display:flex}
#album-header{padding:20px 28px;border-bottom:1px solid rgba(79,195,247,.15);display:flex;justify-content:space-between;align-items:center}
#album-title{font-size:16px;letter-spacing:.2em;color:#4fc3f7}
#album-close{background:none;border:none;color:#446;font-size:18px;cursor:pointer}
#album-close:hover{color:#fff}
#album-body{overflow-y:auto;flex:1;padding:0 28px 28px}
.album-section-title{font-size:12px;color:#446;letter-spacing:.15em;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid rgba(79,195,247,.1)}
.album-progress{font-size:11px;color:#c9a227;margin-left:12px}
#collection-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
#album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.photo-card{border:1px solid rgba(79,195,247,.2);border-radius:10px;background:rgba(0,8,22,.6);padding:8px;display:flex;flex-direction:column;gap:6px}
.photo-card-title{font-size:10px;color:#8ab;letter-spacing:.06em;line-height:1.3;min-height:28px}
.photo-card-img{width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:6px}
.photo-card-img canvas{width:100%;height:100%;display:block;object-fit:cover}
.photo-card-meta{font-size:9px;color:#446;letter-spacing:.05em}
.photo-dl-btn{padding:4px 8px;border-radius:8px;border:1px solid rgba(79,195,247,.3);background:rgba(0,10,30,.6);color:#4fc3f7;font-size:10px;cursor:pointer;letter-spacing:.06em;transition:all .2s;align-self:flex-end}
.photo-dl-btn:hover{background:rgba(79,195,247,.15)}
.album-slot{border:1px solid rgba(79,195,247,.2);border-radius:10px;overflow:hidden;background:rgba(0,8,22,.6);aspect-ratio:16/9;position:relative;cursor:pointer}
.album-slot.collected{border-color:rgba(201,162,39,.5);box-shadow:0 0 8px rgba(201,162,39,.15)}
.album-slot canvas,.album-slot img{width:100%;height:100%;display:block;object-fit:cover}
.album-slot .slot-label{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);font-size:10px;color:#9ab;letter-spacing:.05em;line-height:1.4;white-space:pre-line}
.album-slot .slot-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#334;font-size:10px;gap:4px;text-align:center;padding:8px}
.album-slot .slot-empty-icon{font-size:20px;opacity:.3}
.album-slot .slot-hint{font-size:9px;color:#335;margin-top:2px}

/* ── COCKPIT OVERLAY ── */
#cockpit{position:fixed;inset:0;z-index:16;pointer-events:none;opacity:0;transition:opacity .8s}
#cockpit.active{opacity:1}
.ckp-frame{position:absolute;background:rgba(0,8,20,.85)}
.ckp-top{top:0;left:0;right:0;height:28px;border-bottom:1px solid rgba(79,195,247,.2)}
.ckp-bottom{bottom:0;left:0;right:0;height:48px;border-top:1px solid rgba(79,195,247,.25)}
.ckp-left{top:28px;left:0;width:32px;bottom:48px;border-right:1px solid rgba(79,195,247,.12)}
.ckp-right{top:28px;right:0;width:32px;bottom:48px;border-left:1px solid rgba(79,195,247,.12)}
.ckp-corner{position:absolute;width:60px;height:60px;border:1px solid rgba(79,195,247,.2);background:rgba(0,8,20,.7)}
.ckp-tl{top:28px;left:32px;border-top:none;border-left:none;border-radius:0 0 16px 0}
.ckp-tr{top:28px;right:32px;border-top:none;border-right:none;border-radius:0 0 0 16px}
.ckp-bl{bottom:48px;left:32px;border-bottom:none;border-left:none;border-radius:0 16px 0 0}
.ckp-br{bottom:48px;right:32px;border-bottom:none;border-right:none;border-radius:16px 0 0 0}
#ckp-hud-left{position:absolute;left:40px;bottom:56px;display:flex;flex-direction:column;gap:4px}
#ckp-hud-right{position:absolute;right:40px;bottom:56px;display:flex;flex-direction:column;gap:4px;text-align:right}
.ckp-readout{font-size:10px;color:#4fc3f7;letter-spacing:.08em;display:flex;gap:8px;align-items:baseline}
.ckp-lbl{color:#335;font-size:9px;letter-spacing:.12em;min-width:28px}
#ckp-crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(79,195,247,.3);font-size:20px;font-weight:100;pointer-events:none}

/* ── SEQUENCE OVERLAYS ── */
#sequence{position:fixed;inset:0;z-index:40;pointer-events:none}
#flash{position:fixed;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity .3s}
#msg-overlay{position:fixed;inset:0;z-index:45;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 1s}
#msg-title{font-size:clamp(20px,4vw,48px);font-weight:bold;letter-spacing:.2em;text-align:center;margin-bottom:12px}
#msg-sub{font-size:14px;letter-spacing:.15em;color:#4fc3f7;text-align:center;line-height:1.8}

/* ── LANDING OVERLAY ── */
#land-overlay{position:fixed;inset:0;z-index:48;background:radial-gradient(ellipse,transparent 30%,#000 100%);opacity:0;pointer-events:none;transition:opacity .5s}
#speed-lines-c{position:fixed;inset:0;z-index:47;pointer-events:none;opacity:0}

/* ── ENDING ── */
#ending{position:fixed;inset:0;z-index:60;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px}
#ending.show{display:flex}
#ending-text{font-size:15px;color:#b0c8e8;line-height:2.2;text-align:center;max-width:620px;letter-spacing:.04em}
#ending-text .highlight{color:#4fc3f7}
#ending-photos{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center;max-width:800px}
#ending-photos canvas{width:160px;height:90px;border-radius:8px;border:1px solid rgba(79,195,247,.25)}
#ending-restart{margin-top:30px;padding:10px 28px;border:1px solid rgba(79,195,247,.4);border-radius:24px;background:transparent;color:#4fc3f7;font-size:13px;cursor:pointer;letter-spacing:.1em;transition:all .2s}
#ending-restart:hover{background:rgba(79,195,247,.15)}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  #game-title{font-size:12px;letter-spacing:.15em}
  #game-sub{font-size:9px;display:none}
  #nav-info{font-size:10px;max-width:140px}
  #controls-row{gap:6px;justify-content:center;padding:0 8px}
  .hud-btn{padding:8px 10px;font-size:10px;min-height:36px}
  #speed-range{width:60px}
  .ctrl-label{font-size:9px}
  #speed-val{font-size:9px!important;min-width:30px!important}
  #photo-count{font-size:9px}
  #hud-top{padding:8px 12px}
  #hud-bottom{padding:6px 8px}
  #dest-menu{left:8px;max-height:70vh;overflow-y:auto}
  .dest-btn{padding:10px 12px;font-size:11px;min-height:36px}
  #info-panel{right:8px;left:8px;width:auto;max-width:300px;transform:translateY(-50%)}
  #album-body{padding:0 12px 12px}
  #collection-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  #album-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .album-slot .slot-label{font-size:9px;padding:4px 6px}
  #ckp-hud-left,#ckp-hud-right{bottom:52px}
  .ckp-readout{font-size:9px}
  #msg-title{font-size:clamp(16px,3.5vw,36px)}
  #msg-sub{font-size:12px}
  #unit-btn{min-width:32px}
}
@media(max-width:480px){
  #nav-info{display:none}
  #controls-row{gap:4px}
  .hud-btn{padding:8px 8px;font-size:9px}
  #collection-grid{grid-template-columns:repeat(2,1fr)}
  .ckp-corner{width:30px;height:30px}
}
/* prevent iOS rubber-banding / accidental nav */
html,body{overscroll-behavior:none;touch-action:none}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .8s}
#loading p{font-size:13px;color:#4fc3f7;letter-spacing:.12em}
#lbar{width:200px;height:2px;background:#111;border-radius:2px}
#lprog{height:100%;background:#4fc3f7;border-radius:2px;width:0%;transition:width .4s}
#loading .hint{font-size:10px;color:#335;letter-spacing:.08em;margin-top:12px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">

  </div>

    <div id="controls-row">
      <span class="ctrl-label">時間加速</span>

      <button class="hud-btn" id="photo-btn">📷 撮影</button>
      <button class="hud-btn" id="album-btn">🖼 アルバム</button>
      <button class="hud-btn" id="unit-btn" title="距離単位を切替">km</button>
      <button class="hud-btn" id="mute-btn" title="音声ON/OFF">🔇</button>
      <span id="photo-count">📸 0枚</span>
    </div>
  </div>
</div>

<!-- Destination menu -->
<div id="dest-menu">
  <div id="dest-title">DESTINATION</div>
</div>

<!-- Info panel -->
<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-dot"></div>
  <div id="info-name-en"></div>
  <div id="info-name-ja"></div>
  <div id="info-facts"></div>
  <button id="travel-btn">🚀 この惑星を旅する</button>
</div>

<!-- Cockpit overlay -->
<div id="cockpit">
  <div class="ckp-frame ckp-top"></div>
  <div class="ckp-frame ckp-bottom"></div>
  <div class="ckp-frame ckp-left"></div>
  <div class="ckp-frame ckp-right"></div>
  <div class="ckp-corner ckp-tl"></div>
  <div class="ckp-corner ckp-tr"></div>
  <div class="ckp-corner ckp-bl"></div>
  <div class="ckp-corner ckp-br"></div>
  <div id="ckp-hud-left">
    <div class="ckp-readout"><span class="ckp-lbl">ALT</span><span id="ckp-alt">—</span></div>
    <div class="ckp-readout"><span class="ckp-lbl">VEL</span><span id="ckp-vel">—</span></div>
  </div>
  <div id="ckp-hud-right">
    <div class="ckp-readout"><span class="ckp-lbl">LOC</span><span id="ckp-loc">—</span></div>
    <div class="ckp-readout"><span class="ckp-lbl">HDG</span><span id="ckp-hdg">—</span></div>
  </div>
  <div id="ckp-crosshair">+</div>
</div>

<!-- Surface view canvas -->
<canvas id="surface-canvas" style="position:fixed;inset:0;z-index:55;display:none;width:100%;height:100%"></canvas>
<div id="surface-ui" style="position:fixed;inset:0;z-index:56;display:none;pointer-events:all;cursor:grab;">
  <button id="surface-back-btn" style="pointer-events:all;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 28px;border:1px solid rgba(79,195,247,.5);border-radius:24px;background:rgba(0,8,20,.7);color:#4fc3f7;font-size:13px;cursor:pointer;letter-spacing:.1em;">🚀 宇宙へ戻る</button>
  <div id="surface-info" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:12px;color:#8ab;letter-spacing:.1em;"></div>
  <button id="saturn-storm-btn" style="display:none;pointer-events:all;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 28px;border:1px solid rgba(255,200,80,.5);border-radius:24px;background:rgba(20,10,0,.8);color:#ffc850;font-size:14px;cursor:pointer;letter-spacing:.1em;">⚡ 嵐を収める</button>
</div>

<!-- Speed lines canvas -->
<canvas id="speed-lines-c"></canvas>
<div id="land-overlay"></div>
<div id="msg-overlay"><div id="msg-title"></div><div id="msg-sub"></div></div>
<div id="flash"></div>

<!-- Album -->
<div id="album">
  <div id="album-header">
    <button id="album-back-btn" style="background:none;border:none;color:#4fc3f7;font-size:13px;cursor:pointer;letter-spacing:.08em;padding:4px 8px;">← 戻る</button>
    <div id="album-title">📸 PALE BLUE DOT — アルバム</div>
    <button id="album-close">✕</button>
  </div>
  <div id="album-body">
    <div class="album-section-title">PALE BLUE DOT COLLECTION <span class="album-progress" id="collection-progress">0 / 12</span></div>
    <div id="collection-grid"></div>
    <div class="album-section-title">PHOTO LOG</div>
    <div id="album-grid"></div>
  </div>
</div>

<!-- Ending -->
<div id="ending">
  <div id="ending-text"></div>
  <div id="ending-photos"></div>
  <button id="ending-restart">もう一度旅をする</button>
</div>

function mkCanvas(w=512,h=512){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function smoothNoise(x,y,seed=0){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  function h(a,b){let n=a*1619+b*31337+seed*1013;n=(n^(n>>13))*(n*n*15731+789221)+1376312589;return((n>>16)&0xffff)/0xffff;}
  return h(ix,iy)*(1-u)*(1-v)+h(ix+1,iy)*u*(1-v)+h(ix,iy+1)*(1-u)*v+h(ix+1,iy+1)*u*v;
}
function fbm(x,y,octs=6,seed=0){let v=0,a=.5,f=1;for(let i=0;i<octs;i++){v+=a*smoothNoise(x*f,y*f,seed+i*100);a*=.5;f*=2.1;}return v;}
function warpFbm(x,y,octs,seed){const qx=fbm(x,y,octs,seed),qy=fbm(x+5.2,y+1.3,octs,seed+50);return fbm(x+1.7*qx,y+1.7*qy,octs,seed+200);}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function mix3(a,b,t){return[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];}

  ];
  for(let i=0;i<jobs.length;i++){
    const [key,label,fn]=jobs[i];
    setProgress(Math.round((i/jobs.length)*90), `${label}を生成中...`);

// ═══════════════════════════════════════════════════════════════════════
// BUILD SOLAR SCENE (called after textures are loaded)
// ═══════════════════════════════════════════════════════════════════════
function buildScene(){
// ═══════════════════════════════════════════════════════════════════════
// WEB AUDIO — AMBIENT SOUND SYSTEM
// ═══════════════════════════════════════════════════════════════════════
let audioCtx=null, audioStarted=false;
const audioNodes={};

function initAudio(){
  if(audioStarted)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    audioStarted=true;

    // Master gain
    const master=audioCtx.createGain();
    master.gain.value=0.5;
    master.connect(audioCtx.destination);
    audioNodes.master=master;

    // Ambient drone — deep space hum (two detuned oscillators + filter)
    const droneA=audioCtx.createOscillator();
    droneA.type='sine';droneA.frequency.value=55;
    const droneB=audioCtx.createOscillator();
    droneB.type='sine';droneB.frequency.value=55.3;
    const droneC=audioCtx.createOscillator();
    droneC.type='sine';droneC.frequency.value=82.5;
    const droneGain=audioCtx.createGain();
    droneGain.gain.value=0.35;
    const droneFilter=audioCtx.createBiquadFilter();
    droneFilter.type='lowpass';droneFilter.frequency.value=200;droneFilter.Q.value=2;
    droneA.connect(droneFilter);droneB.connect(droneFilter);droneC.connect(droneFilter);
    droneFilter.connect(droneGain);droneGain.connect(master);
    droneA.start();droneB.start();droneC.start();
    audioNodes.droneGain=droneGain;
    audioNodes.droneFilter=droneFilter;

    // Planet proximity resonance oscillator (activated near planets)
    const proxOsc=audioCtx.createOscillator();
    proxOsc.type='triangle';proxOsc.frequency.value=220;
    const proxGain=audioCtx.createGain();
    proxGain.gain.value=0;
    const proxFilter=audioCtx.createBiquadFilter();
    proxFilter.type='bandpass';proxFilter.frequency.value=440;proxFilter.Q.value=5;
    proxOsc.connect(proxFilter);proxFilter.connect(proxGain);proxGain.connect(master);
    proxOsc.start();
    audioNodes.proxOsc=proxOsc;audioNodes.proxGain=proxGain;audioNodes.proxFilter=proxFilter;

    // Wind/atmosphere noise (for surface mode)
    const noiseLen=audioCtx.sampleRate*2;
    const noiseBuf=audioCtx.createBuffer(1,noiseLen,audioCtx.sampleRate);
    const noiseData=noiseBuf.getChannelData(0);
    for(let i=0;i<noiseLen;i++) noiseData[i]=(Math.random()*2-1)*0.5;
    const noiseSrc=audioCtx.createBufferSource();
    noiseSrc.buffer=noiseBuf;noiseSrc.loop=true;
    const noiseGain=audioCtx.createGain();
    noiseGain.gain.value=0;
    const noiseFilter=audioCtx.createBiquadFilter();
    noiseFilter.type='lowpass';noiseFilter.frequency.value=400;noiseFilter.Q.value=1;
    noiseSrc.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(master);
    noiseSrc.start();
    audioNodes.noiseGain=noiseGain;audioNodes.noiseFilter=noiseFilter;

  }catch(e){console.warn('Web Audio not available:',e);}
}

// Sound effects
function playSfx(type){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  if(type==='shutter'){
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='square';osc.frequency.value=1200;
    g.gain.setValueAtTime(0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    osc.frequency.exponentialRampToValueAtTime(600,t+0.08);
    osc.connect(g);g.connect(audioNodes.master);
    osc.start(t);osc.stop(t+0.15);
  }else if(type==='warp'){
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sawtooth';osc.frequency.value=80;
    osc.frequency.exponentialRampToValueAtTime(2000,t+1.2);
    g.gain.setValueAtTime(0.1,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    const f=audioCtx.createBiquadFilter();
    f.type='lowpass';f.frequency.value=800;
    f.frequency.exponentialRampToValueAtTime(4000,t+1.0);
    osc.connect(f);f.connect(g);g.connect(audioNodes.master);
    osc.start(t);osc.stop(t+1.8);
  }else if(type==='landing'){
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=800;
    osc.frequency.exponentialRampToValueAtTime(200,t+0.8);
    g.gain.setValueAtTime(0.12,t);
    g.gain.linearRampToValueAtTime(0,t+1.0);
    osc.connect(g);g.connect(audioNodes.master);
    osc.start(t);osc.stop(t+1.2);
  }else if(type==='collection'){
    // Chime for collection unlock
    [523,659,784].forEach((freq,i)=>{
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t+i*0.12);
      g.gain.linearRampToValueAtTime(0.1,t+i*0.12+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.6);
      o.connect(g);g.connect(audioNodes.master);
      o.start(t+i*0.12);o.stop(t+i*0.12+0.7);
    });
  }
}

// Ambient audio update (called each frame)
function updateAudio(){
  if(!audioCtx||!audioStarted)return;
  const t=audioCtx.currentTime;

  // Suppress ambient when not in open space (R-41/42/47)
  const albumOpen=document.getElementById('album')?.classList.contains('show');
  const suppressAmbient=camState==='surface'||camState==='ending'||albumOpen;
  audioNodes.droneGain.gain.linearRampToValueAtTime(suppressAmbient?0:0.35,t+0.5);
  if(suppressAmbient){
    audioNodes.proxGain.gain.linearRampToValueAtTime(0,t+0.3);
    if(cockpitMode&&camState==='surface'){
      audioNodes.noiseGain.gain.linearRampToValueAtTime(0.04,t+0.5);
    }else{
      audioNodes.noiseGain.gain.linearRampToValueAtTime(0,t+0.3);
    }
    return;
  }

  const cp=camera.position;
  const dist=cp.length();
  const au=dist/EARTH_ORBIT;

  // Drone: deeper in deep space, brighter near sun
  const droneFreq=clamp(100+au*0.5,80,600);
  audioNodes.droneFilter.frequency.linearRampToValueAtTime(droneFreq,t+0.1);

  // Planet proximity resonance
  let minD=Infinity,nearPd=null;
  PLANETS.forEach(pd=>{
    if(pd.r===0)return;
    const m=planetMeshes[pd.id];if(!m)return;
    const d=m.getWorldPosition(new THREE.Vector3()).distanceTo(cp);
    if(d<minD){minD=d;nearPd=pd;}
  });
  if(nearPd&&minD<nearPd.r*10){
    const prox=1-clamp(minD/(nearPd.r*10),0,1);
    audioNodes.proxGain.gain.linearRampToValueAtTime(prox*0.45,t+0.1);
    // Map planet color to frequency
    const freqMap={sun:220,mercury:330,venus:293,earth:261,mars:311,jupiter:174,saturn:196,uranus:349,neptune:392,proxima_b:440};
    const freq=freqMap[nearPd.id]||280;
    audioNodes.proxOsc.frequency.linearRampToValueAtTime(freq,t+0.1);
    audioNodes.proxFilter.frequency.linearRampToValueAtTime(freq*2,t+0.1);
    // Modulate drone filter dramatically to make resonance clearly audible
    const modFreq=droneFreq+prox*800*Math.sin(t*3.7);
    audioNodes.droneFilter.frequency.linearRampToValueAtTime(clamp(modFreq,80,2000),t+0.15);
  }else{
    audioNodes.proxGain.gain.linearRampToValueAtTime(0,t+0.3);
  }

  // Surface wind noise
  if(cockpitMode&&camState==='surface'){
    audioNodes.noiseGain.gain.linearRampToValueAtTime(0.04,t+0.5);
  }else{
    audioNodes.noiseGain.gain.linearRampToValueAtTime(0,t+0.3);
  }
}

function buildPlanetMesh(pd){
  if(pd.r===0||pd.isBoundary||pd.isStar||pd.isExoplanet) return;
  const tex = TEXTURES[pd.id] || null;
  const mat = new THREE.MeshStandardMaterial({
    map: tex, roughness:.85, metalness:.0
  });
  const geo = new THREE.SphereGeometry(pd.r, 48, 48);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.userData.planetId = pd.id;
  // Apply axis tilt
  if(pd.tilt) mesh.rotation.z = THREE.MathUtils.degToRad(pd.tilt);

  if(pd.id==='sun'){
    mesh.material = new THREE.MeshBasicMaterial({map:tex});
    // Sun glow
    const glowC=document.createElement('canvas');glowC.width=glowC.height=128;
    const gc=glowC.getContext('2d');
    const gg=gc.createRadialGradient(64,64,0,64,64,64);
    gg.addColorStop(0,'rgba(255,220,80,.9)');gg.addColorStop(.2,'rgba(255,160,40,.5)');
    gg.addColorStop(.6,'rgba(255,100,0,.12)');gg.addColorStop(1,'rgba(255,80,0,0)');
    gc.fillStyle=gg;gc.fillRect(0,0,128,128);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(glowC),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    spr.scale.set(SUN_R*8,SUN_R*8,1);
    mesh.add(spr);
  }

  // Earth clouds
  if(pd.id==='earth'){
    const atm=new THREE.Mesh(new THREE.SphereGeometry(pd.r*1.02,32,32),
      new THREE.MeshStandardMaterial({color:0x4488ff,transparent:true,opacity:.15,depthWrite:false,blending:THREE.AdditiveBlending}));
    mesh.add(atm);
    const cloud=new THREE.Mesh(new THREE.SphereGeometry(pd.r*1.012,32,32),
      new THREE.MeshStandardMaterial({map:TEXTURES.earthcloud,transparent:true,opacity:.8,depthWrite:false}));
    cloud.userData.isCloud=true;
    mesh.add(cloud);
  }

  // Saturn rings
  if(pd.ring){
    const rGeo=new THREE.RingGeometry(pd.r*1.22,pd.r*2.42,128);
    const pos=rGeo.attributes.position,uv2=rGeo.attributes.uv;
    const inner=pd.r*1.22,outer=pd.r*2.42;
    for(let j=0;j<pos.count;j++){const rx=pos.getX(j),ry=pos.getY(j),rd=Math.sqrt(rx*rx+ry*ry);uv2.setXY(j,(rd-inner)/(outer-inner),.5);}
    const ring=new THREE.Mesh(rGeo,new THREE.MeshBasicMaterial({map:TEXTURES.saturn_ring,side:THREE.DoubleSide,transparent:true,depthWrite:false}));
    ring.rotation.x=Math.PI/2;mesh.add(ring);
    // Volumetric ring duplicate
    const rGeo2=new THREE.RingGeometry(pd.r*1.22,pd.r*2.42,128);
    const pos2=rGeo2.attributes.position,uv3=rGeo2.attributes.uv;
    for(let j=0;j<pos2.count;j++){const rx=pos2.getX(j),ry=pos2.getY(j),rd=Math.sqrt(rx*rx+ry*ry);uv3.setXY(j,(rd-inner)/(outer-inner),.5);}
    const ring2=new THREE.Mesh(rGeo2,new THREE.MeshBasicMaterial({map:TEXTURES.saturn_ring,side:THREE.DoubleSide,transparent:true,opacity:.4,depthWrite:false}));
    ring2.rotation.x=Math.PI/2;ring2.position.y=pd.r*.008;mesh.add(ring2);
    // B-ring self-shadow band
    const shadowGeo=new THREE.RingGeometry(pd.r*1.44,pd.r*1.92,64);
    const shadowMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.12,side:THREE.DoubleSide,depthWrite:false});
    const shadowRing=new THREE.Mesh(shadowGeo,shadowMat);
    shadowRing.rotation.x=Math.PI/2;shadowRing.position.y=-pd.r*.005;mesh.add(shadowRing);
    // particles — 12,000 distributed by ring profile
    const pCount=12000,pPos=new Float32Array(pCount*3),pCol=new Float32Array(pCount*3);
    const bandW=[
      {r:[.00,.24],w:.06},  // C ring (sparse)
      {r:[.24,.42],w:.22},  // B ring inner (dense)
      {r:[.42,.62],w:.28},  // B ring outer (densest)
      {r:[.62,.68],w:.005}, // Cassini gap (nearly empty)
      {r:[.68,.88],w:.28},  // A ring
      {r:[.88,.93],w:.08},  // A ring outer
      {r:[.96,1.0],w:.055}, // F ring
    ];
    for(let j=0;j<pCount;j++){
      let pick=Math.random(),band=bandW[bandW.length-1];
      for(const bw of bandW){pick-=bw.w;if(pick<=0){band=bw;break;}}
      const t=band.r[0]+(band.r[1]-band.r[0])*Math.random();
      const radius=inner+t*(outer-inner);
      const angle=Math.random()*Math.PI*2;
      const thick=pd.r*.012*(Math.random()-.5);
      pPos[j*3]=Math.cos(angle)*radius;pPos[j*3+1]=thick;pPos[j*3+2]=Math.sin(angle)*radius;
      const br=.7+Math.random()*.3;pCol[j*3]=br*.9;pCol[j*3+1]=br*.82;pCol[j*3+2]=br*.55;
    }
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
    pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
    const pMesh=new THREE.Points(pGeo,new THREE.PointsMaterial({vertexColors:true,size:.018,transparent:true,opacity:.55,depthWrite:false,sizeAttenuation:true}));
    mesh.add(pMesh);
  }

  // Mars atmosphere (dust haze)
  if(pd.id==='mars'){
    mesh.add(new THREE.Mesh(new THREE.SphereGeometry(pd.r*1.018,32,32),
      new THREE.MeshStandardMaterial({color:0xc87040,transparent:true,opacity:.08,depthWrite:false,blending:THREE.AdditiveBlending})));
  }

  // Neptune atmosphere (blue glow)
  if(pd.id==='neptune'){
    mesh.add(new THREE.Mesh(new THREE.SphereGeometry(pd.r*1.025,32,32),
      new THREE.MeshStandardMaterial({color:0x3060ff,transparent:true,opacity:.12,depthWrite:false,blending:THREE.AdditiveBlending})));
  }

  // Orbit line
  if(pd.orbitR>0){
    const pts=[];
    for(let j=0;j<=128;j++){const a=j/128*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*pd.orbitR,0,Math.sin(a)*pd.orbitR));}
    scene.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0x223355,transparent:true,opacity:.3})));
  }

  scene.add(mesh);
  planetMeshes[pd.id] = mesh;
  orbitAngles[pd.id] = Math.random()*Math.PI*2;
  selfRot[pd.id] = 0;
}

let camState = 'orbit'; // 'orbit' | 'traveling' | 'surface' | 'returning' | 'ending'
let spherical = {theta:0.3, phi:Math.PI/3.5, r:3000};
let orbitTarget = new THREE.Vector3(0,0,0);
let simSpeed = 1;
let paused = false;
let currentPlanetInfo = null;
let focusedPlanetId = null;

// Camera look (cockpit mode during travel)
let cockpitMode = false;
let cockpitYaw = 0, cockpitPitch = 0;

// Travel state
let travelFrom = new THREE.Vector3();
let travelTo = new THREE.Vector3();
let travelProgress = 0;
let travelDuration = 0;
let travelTargetId = null;
let travelCallback = null;

// Photos
const photos = []; // {canvas, label, location, dist}

// Orbit control
let isDragging=false,lastMouse={x:0,y:0};

function updateCamera(){
  if(cockpitMode) return;
  const x=orbitTarget.x+spherical.r*Math.sin(spherical.phi)*Math.sin(spherical.theta);
  const y=orbitTarget.y+spherical.r*Math.cos(spherical.phi);
  const z=orbitTarget.z+spherical.r*Math.sin(spherical.phi)*Math.cos(spherical.theta);
  camera.position.set(x,y,z);camera.lookAt(orbitTarget);
}
updateCamera();

canvas.addEventListener('mousedown',e=>{isDragging=true;lastMouse={x:e.clientX,y:e.clientY};clickStart={x:e.clientX,y:e.clientY};});
window.addEventListener('mousemove',e=>{
  if(isDragging&&!cockpitMode){
    const dx=e.clientX-lastMouse.x,dy=e.clientY-lastMouse.y;
    lastMouse={x:e.clientX,y:e.clientY};
    spherical.theta-=dx*.004;
    spherical.phi=Math.max(.05,Math.min(Math.PI-.05,spherical.phi-dy*.004));
    updateCamera();
  }
  if(cockpitMode){
    if(isDragging){
      cockpitYaw+=(e.clientX-lastMouse.x)*.003;
      cockpitPitch=Math.max(-1.1,Math.min(1.1,cockpitPitch-(e.clientY-lastMouse.y)*.003));
      lastMouse={x:e.clientX,y:e.clientY};
    }
  }
});
let clickStart={x:0,y:0};
window.addEventListener('mouseup',e=>{
  if(isDragging){
    if(Math.abs(e.clientX-clickStart.x)<5&&Math.abs(e.clientY-clickStart.y)<5) handleClick(e.clientX,e.clientY);
    isDragging=false;
  }
});
canvas.addEventListener('wheel',e=>{
  if(cockpitMode)return;
  if(e.ctrlKey){
    e.preventDefault();
    const delta=e.deltaY>0?-1:1;
    const moveSpeed=spherical.r*0.08*delta;
    const mouseVec=new THREE.Vector2(
      (e.clientX/window.innerWidth)*2-1,
      -(e.clientY/window.innerHeight)*2+1
    );
    const rc=new THREE.Raycaster();
    rc.setFromCamera(mouseVec,camera);
    const dir=rc.ray.direction.clone().multiplyScalar(moveSpeed);
    camera.position.add(dir);
    orbitTarget.add(dir.clone().multiplyScalar(0.3));
    spherical.r=camera.position.distanceTo(orbitTarget);
    spherical.r=Math.max(spherical.r,10);
  } else {
    spherical.r=Math.max(30,Math.min(80000000,spherical.r*(e.deltaY>0?1.12:.89)));
    updateCamera();
  }
},{passive:false});

// Touch events for mobile
let touchStartDist=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    isDragging=true;lastMouse={x:t.clientX,y:t.clientY};clickStart={x:t.clientX,y:t.clientY};
  }else if(e.touches.length===2){
    // Pinch zoom start
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    touchStartDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const t=e.touches[0];
    const dx=t.clientX-lastMouse.x,dy=t.clientY-lastMouse.y;
    if(!cockpitMode){
      spherical.theta-=dx*.006;
      spherical.phi=Math.max(.05,Math.min(Math.PI-.05,spherical.phi-dy*.006));
      updateCamera();
    }else{
      cockpitYaw+=dx*.004;
      cockpitPitch=Math.max(-1.1,Math.min(1.1,cockpitPitch-dy*.004));
    }
    lastMouse={x:t.clientX,y:t.clientY};
  }else if(e.touches.length===2&&!cockpitMode){
    // Pinch zoom
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(touchStartDist>0){
      const scale=touchStartDist/dist;
      spherical.r=Math.max(30,Math.min(80000000,spherical.r*Math.pow(scale,0.15)));
      updateCamera();
    }
    touchStartDist=dist;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(isDragging&&e.changedTouches.length>0){
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-clickStart.x)<10&&Math.abs(t.clientY-clickStart.y)<10) handleClick(t.clientX,t.clientY);
  }
  isDragging=false;touchStartDist=0;
});

// Raycasting
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
function handleClick(mx,my){
  if(camState!=='orbit')return;
  mouse.x=(mx/innerWidth)*2-1;mouse.y=-(my/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const meshArr=Object.values(planetMeshes);
  const hits=raycaster.intersectObjects(meshArr,false);
  if(hits.length){
    const pid=hits[0].object.userData.planetId;
    if(pid) showInfoPanel(pid);
  }
}

  if(infoDotAnimId){cancelAnimationFrame(infoDotAnimId);infoDotAnimId=null;}
  let iconAngle=0;
  const texKey=pd.id;
  const srcTex=TEXTURES[texKey];
  function drawIconFrame(){
    ictx.clearRect(0,0,128,128);
    ictx.save();
    ictx.beginPath();ictx.arc(64,64,58,0,Math.PI*2);ictx.clip();
    if(srcTex&&srcTex.image){
      const img=srcTex.image;
      const iw=img.width||256,ih=img.height||256;
      const offsetX=((iconAngle/(Math.PI*2))*iw)%iw;
      // brightness filter removes baked-in shadow from texture
      ictx.filter='brightness(1.6)';
      ictx.drawImage(img,offsetX,0,iw-offsetX,ih,-58,0,116*(iw-offsetX)/iw,116);
      if(offsetX>0)ictx.drawImage(img,0,0,offsetX,ih,-58+116*(iw-offsetX)/iw,0,116*offsetX/iw,116);
      ictx.filter='none';
    } else {
      const g=ictx.createRadialGradient(48,38,5,64,64,58);
      g.addColorStop(0,'#fff');g.addColorStop(0.5,pd.colorHex);g.addColorStop(1,pd.colorHex);
      ictx.fillStyle=g;ictx.fillRect(5,5,116,116);
    }
    ictx.restore();
    // Saturn ring drawn outside clip so it extends beyond sphere
    if(pd.id==='saturn'){
      ictx.save();
      ictx.translate(64,64);ictx.scale(1,0.28);
      const rg=ictx.createRadialGradient(0,0,60,0,0,86);
      rg.addColorStop(0,'rgba(200,180,140,0)');
      rg.addColorStop(0.15,'rgba(210,190,150,0.7)');
      rg.addColorStop(0.7,'rgba(180,160,120,0.55)');
      rg.addColorStop(1,'rgba(180,160,120,0)');
      ictx.beginPath();ictx.arc(0,0,86,0,Math.PI*2);
      ictx.fillStyle=rg;ictx.fill();
      ictx.restore();
    }
    iconAngle+=0.015;
    if(document.getElementById('info-panel').classList.contains('show')){
      infoDotAnimId=requestAnimationFrame(drawIconFrame);
    }
  }
  document.getElementById('info-name-en').textContent=pd.nameEn;
  document.getElementById('info-name-ja').textContent=pd.nameJa;
  document.getElementById('info-facts').innerHTML=
    pd.facts.map(([k,v])=>`<div class="info-fact"><span class="info-fk">${k}</span><span class="info-fv">${v}</span></div>`).join('');
  document.getElementById('travel-btn').style.display=pd.noTravel?'none':'block';
  panel.classList.add('show');
  drawIconFrame();
}

function navigateTo(planetId){
  if(camState!=='orbit')return;
  const pd=PLANET_MAP[planetId];
  if(!pd)return;
  document.getElementById('info-panel').classList.remove('show');
  // Focus camera on planet
  let targetPos;
  if(pd.orbitR===0){
    targetPos=new THREE.Vector3(0,0,0);
  } else if(pd.isBoundary){
    targetPos=new THREE.Vector3(pd.orbitR,0,0);
  } else if(pd.isStar){
    // Just move far out
    targetPos=new THREE.Vector3(pd.orbitR,0,0);
  } else {
    const m=planetMeshes[pd.id];
    if(m) targetPos=m.getWorldPosition(new THREE.Vector3());
    else targetPos=new THREE.Vector3(pd.orbitR,0,0);
  }
  // Animate camera to focus
  const startTarget=orbitTarget.clone();
  const startR=spherical.r;
  const targetR=pd.r>0?pd.r*12+30:pd.orbitR*.5;
  let t=0;
  function fly(){
    t=Math.min(1,t+.018);
    const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    orbitTarget.lerpVectors(startTarget,targetPos,e);
    spherical.r=lerp(startR,targetR,e);
    updateCamera();
    if(t<1)requestAnimationFrame(fly);
    else showInfoPanel(planetId);
  }
  requestAnimationFrame(fly);
}

// SCALE UNIT SYSTEM (AU ↔ km ↔ 光年)
// ═══════════════════════════════════════════════════════════════════════
const UNIT_MODES=['km','光年'];
let unitModeIdx=0;
const AU_KM=149597870.7; // 1 AU in km
const LY_AU=63241.077;   // 1 light-year in AU

function formatDistUnit(sceneD){
  const au=sceneD/EARTH_ORBIT;
  const mode=UNIT_MODES[unitModeIdx];
  if(mode==='AU'){
    if(au<0.01) return `${(au*AU_KM).toFixed(0)} km`;
    if(au<1000) return `${au.toFixed(3)} AU`;
    return `${(au/LY_AU).toFixed(4)} 光年`;
  }else if(mode==='km'){
    const km=au*AU_KM;
    if(km<1e6) return `${km.toFixed(0)} km`;
    if(km<1e9) return `${(km/1e6).toFixed(2)} 百万km`;
    if(km<1e12) return `${(km/1e9).toFixed(2)} 十億km`;
    return `${(km/9.461e12).toFixed(4)} 光年`;
  }else{
    const ly=au/LY_AU;
    if(ly<1e-6) return `${(ly*9.461e12).toFixed(0)} km`;
    if(ly<0.001) return `${(ly*LY_AU).toFixed(3)} AU`;
    return `${ly.toFixed(6)} 光年`;
  }
}
function formatLight(d){
  const au=d/EARTH_ORBIT;
  const minutes=au*8.317;
  if(minutes<1)return`${(minutes*60).toFixed(0)}秒`;
  if(minutes<60)return`${minutes.toFixed(1)}分`;
  if(minutes<1440)return`${(minutes/60).toFixed(1)}時間`;
  if(minutes<525600)return`${(minutes/1440).toFixed(1)}日`;
  return`${(minutes/525600).toFixed(2)}年`;
}
function formatNearestDist(sceneD, pd){
  const au=sceneD/EARTH_ORBIT;
  // Show distance relative to planet radius for close approach
  if(sceneD < pd.r*3) return `${(sceneD/pd.r).toFixed(1)}R`;
  return formatDistUnit(sceneD);
}

function updateNavInfo(){
  const cp=camera.position;
  const dist=cp.length();
  let nearest=null,minD=Infinity;
  PLANETS.forEach(pd=>{
    if(pd.r===0)return;
    const m=planetMeshes[pd.id];
    if(!m)return;
    const d=m.getWorldPosition(new THREE.Vector3()).distanceTo(cp);
    if(d<minD){minD=d;nearest=pd;}
  });
  const nearLabel=nearest?`${nearest.nameJa} (${formatNearestDist(minD,nearest)})`:'—';
  document.getElementById('nav-dest').textContent=`近傍: ${nearLabel}`;
  document.getElementById('nav-dist').textContent=`太陽から: ${formatDistUnit(dist)}`;
  document.getElementById('nav-light').textContent=`光で: ${formatLight(dist)}`;
}

  unitModeIdx=(unitModeIdx+1)%UNIT_MODES.length;

});

// INDEXEDDB PHOTO STORAGE
// ═══════════════════════════════════════════════════════════════════════
let photoDB=null;
function openPhotoDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('PaleBlueDotPhotos',1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('photos')){
        const store=db.createObjectStore('photos',{keyPath:'id',autoIncrement:true});
        store.createIndex('timestamp','timestamp');
        store.createIndex('slotId','slotId');
      }
    };
    req.onsuccess=e=>{photoDB=e.target.result;resolve(photoDB);};
    req.onerror=e=>reject(e.target.error);
  });
}
function dbSavePhoto(photoData){
  return new Promise((resolve,reject)=>{
    const tx=photoDB.transaction('photos','readwrite');
    const store=tx.objectStore('photos');
    const req=store.add(photoData);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbGetAllPhotos(){
  return new Promise((resolve,reject)=>{
    const tx=photoDB.transaction('photos','readonly');
    const store=tx.objectStore('photos');
    const req=store.index('timestamp').getAll();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbUpdateSlot(id,updates){
  return new Promise((resolve,reject)=>{
    const tx=photoDB.transaction('photos','readwrite');
    const store=tx.objectStore('photos');
    const getReq=store.get(id);
    getReq.onsuccess=()=>{
      const data=Object.assign(getReq.result,updates);
      store.put(data).onsuccess=()=>resolve();
    };
    getReq.onerror=e=>reject(e.target.error);
  });
}
function dbDeletePhoto(timestamp){
  return new Promise((resolve,reject)=>{
    if(!photoDB){resolve();return;}
    const tx=photoDB.transaction('photos','readwrite');
    const store=tx.objectStore('photos');
    const req=store.index('timestamp').getKey(timestamp);
    req.onsuccess=()=>{
      if(req.result!=null) store.delete(req.result).onsuccess=()=>resolve();
      else resolve();
    };
    req.onerror=e=>reject(e.target.error);
  });
}
function dbRenamePhoto(timestamp,newLabel){
  return new Promise((resolve,reject)=>{
    if(!photoDB){resolve();return;}
    const tx=photoDB.transaction('photos','readwrite');
    const store=tx.objectStore('photos');
    const req=store.index('timestamp').openCursor(IDBKeyRange.only(timestamp));
    req.onsuccess=()=>{
      const cursor=req.result;
      if(cursor){const d=cursor.value;d.label=newLabel;cursor.update(d).onsuccess=()=>resolve();}
      else resolve();
    };
    req.onerror=e=>reject(e.target.error);
  });
}

];
const collectionMap={}; // slotId -> photo data (filled from DB or new captures)

function detectSlotId(location, au, nearestId, camSt){
  // Check proximity to nearest planet directly
  if(nearestId){
    const pd=PLANET_MAP[nearestId];
    const m=planetMeshes[nearestId];
    if(pd&&m){
      const dist=m.getWorldPosition(new THREE.Vector3()).distanceTo(camera.position);
      const closeEnough=dist<Math.max(pd.r*8,pd.r+5);
      if(nearestId==='mercury'&&closeEnough) return 'mercury_view';
      if(nearestId==='venus'&&closeEnough)   return 'venus_view';
      if(nearestId==='earth'&&closeEnough)   return 'earth_view';
      if(nearestId==='mars'&&closeEnough)    return 'mars_view';
      if(nearestId==='jupiter'&&closeEnough) return 'jupiter_view';
      if(nearestId==='saturn'&&closeEnough)  return 'saturn_view';
      if(nearestId==='uranus'&&closeEnough)  return 'uranus_view';
      if(nearestId==='neptune'&&closeEnough) return 'neptune_view';
    }
  }
  if(au>100&&au<1000)               return 'heliopause';
  if(au>100000)                     return 'pale_blue_dot';
  if(au>1000&&au<=100000)           return 'interstellar';
  if(!collectionMap['departure'])   return 'departure';
  return null;
}

function takePhoto(){
  renderer.render(scene,camera);
  const snap=document.createElement('canvas');
  snap.width=canvas.width;snap.height=canvas.height;
  const ctx2=snap.getContext('2d');
  ctx2.drawImage(canvas,0,0);

  const cp=camera.position;
  const dist=cp.length();
  const au=dist/EARTH_ORBIT;
  let location='宇宙空間';
  let nearest=null,minD=Infinity,nearestId=null;
  PLANETS.forEach(pd=>{
    if(pd.r===0)return;
    const m=planetMeshes[pd.id];
    if(!m)return;
    const d=m.getWorldPosition(new THREE.Vector3()).distanceTo(cp);
    if(d<minD){minD=d;nearest=pd;nearestId=pd.id;}
  });
  if(nearest&&minD<nearest.r*5) location=`${nearest.nameJa}付近`;
  else if(au>100000) location='恒星間空間';
  else if(au>100) location='ヘリオポーズ付近';

  const label=generateTitle(location,au,nearest,camState);
  const distLabel=au>100000?`${(au/63241).toFixed(2)}光年`:`${au.toFixed(1)} AU`;
  const slotId=detectSlotId(location,au,nearestId,camState);

  // Convert canvas to blob for IndexedDB storage
  snap.toBlob(blob=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const photoData={
        dataUrl:reader.result,
        label, location, dist:distLabel, au,
        slotId: (slotId&&!collectionMap[slotId]) ? slotId : null,
        timestamp:Date.now(),
      };
      // Save to in-memory array
      photos.push({canvas:snap,label,location,dist:distLabel,slotId:photoData.slotId,timestamp:photoData.timestamp});

      // Check collection
      let collectionMsg='';
      if(photoData.slotId){
        collectionMap[photoData.slotId]=photoData;
        const slot=COLLECTION_SLOTS.find(s=>s.slotId===photoData.slotId);
        if(slot){ collectionMsg=`\n${slot.icon} ${slot.label} — コレクション獲得！`; playSfx('collection'); }
      }

      // Persist to IndexedDB
      if(photoDB){
        dbSavePhoto(photoData).then(()=>updateAlbum()).catch(e=>console.warn('Photo save failed:',e));
      }

      document.getElementById('photo-count').textContent=`📸 ${photos.length}枚`;
      updateAlbum();
      showMsg(`📸 撮影完了\n${label}${collectionMsg}`,collectionMsg?3000:1500);
    };
    reader.readAsDataURL(blob);
  },'image/jpeg',0.92);

  // Flash
  const flash=document.getElementById('flash');
  flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',200);
}

document.getElementById('photo-btn').addEventListener('click',takePhoto);

function updateAlbum(){
  // Collection grid
  const cgrid=document.getElementById('collection-grid');
  cgrid.innerHTML='';
  let collected=0;
  COLLECTION_SLOTS.forEach(slot=>{
    const el=document.createElement('div');
    el.className='album-slot'+(collectionMap[slot.slotId]?' collected':'');
    if(collectionMap[slot.slotId]){
      collected++;
      const img=new Image();
      img.src=collectionMap[slot.slotId].dataUrl;
      el.appendChild(img);
      const lbl=document.createElement('div');lbl.className='slot-label';
      lbl.textContent=`${slot.icon} ${slot.label}`;
      el.appendChild(lbl);
    }else{
      el.innerHTML=`<div class="slot-empty"><div class="slot-empty-icon">${slot.icon}</div><div>${slot.label}</div><div class="slot-hint">${slot.hint}</div></div>`;
    }
    cgrid.appendChild(el);
  });
  document.getElementById('collection-progress').textContent=`${collected} / 12`;

  // Photo log grid — 9 fixed slots + overflow
  const grid=document.getElementById('album-grid');
  grid.innerHTML='';
  function makePhotoCard(ph, idx){
    const card=document.createElement('div');card.className='photo-card';
    const titleDiv=document.createElement('div');titleDiv.className='photo-card-title';
    titleDiv.textContent=ph?ph.label:'No Photo';
    card.appendChild(titleDiv);
    const imgDiv=document.createElement('div');imgDiv.className='photo-card-img';
    if(ph){
      const c=document.createElement('canvas');
      c.width=320;c.height=180;
      c.getContext('2d').drawImage(ph.canvas,0,0,320,180);
      imgDiv.appendChild(c);
    } else {
      imgDiv.style.cssText='display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;color:#334;font-size:22px;opacity:.4';
      imgDiv.textContent='📷';
    }
    card.appendChild(imgDiv);
    const metaDiv=document.createElement('div');metaDiv.className='photo-card-meta';
    if(ph){
      const ts=ph.timestamp?new Date(ph.timestamp).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
      metaDiv.textContent=`${ph.location||''} • ${ts}`;
    } else {
      metaDiv.textContent='撮影なし';
    }
    card.appendChild(metaDiv);
    if(ph){
      const dlBtn=document.createElement('button');dlBtn.className='photo-dl-btn';dlBtn.textContent='💾 保存';
      dlBtn.addEventListener('click',()=>{
        const dlC=document.createElement('canvas');dlC.width=ph.canvas.width;dlC.height=ph.canvas.height;
        dlC.getContext('2d').drawImage(ph.canvas,0,0);
        dlC.toBlob(blob=>{
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download='pale-blue-dot-photo.png';a.click();
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        });
      });
      card.appendChild(dlBtn);
      const renameBtn=document.createElement('button');renameBtn.className='photo-dl-btn';renameBtn.textContent='✏ 名前変更';
      renameBtn.addEventListener('click',()=>{
        const newLabel=prompt('新しい名前を入力してください',ph.label||'');
        if(newLabel===null||newLabel.trim()==='')return;
        ph.label=newLabel.trim();
        titleDiv.textContent=ph.label;
        dbRenamePhoto(ph.timestamp,ph.label).catch(e=>console.warn('rename failed',e));
      });
      card.appendChild(renameBtn);
      const deleteBtn=document.createElement('button');deleteBtn.className='photo-dl-btn';deleteBtn.style.color='#f88';deleteBtn.textContent='🗑 削除';
      deleteBtn.addEventListener('click',()=>{

        document.getElementById('photo-count').textContent=`📸 ${photos.length}枚`;
        dbDeletePhoto(ph.timestamp).catch(e=>console.warn('delete failed',e));
        updateAlbum();
      });
      card.appendChild(deleteBtn);
    }
    return card;
  }
  // 9 fixed slots
  for(let i=0;i<9;i++){

  }
  // Additional photos beyond 9
  for(let i=9;i<photos.length;i++){

}

function clearAllPhotos(){

  return new Promise(resolve=>{
    const req=indexedDB.deleteDatabase('PaleBlueDotPhotos');
    req.onsuccess=()=>{photoDB=null;resolve();};
    req.onerror=()=>resolve();
    req.onblocked=()=>resolve();
  });
}

// Load saved photos from IndexedDB on startup
async function loadSavedPhotos(){
  try{
    // Hard-reload detection: transferSize>0 means browser bypassed HTTP cache (Ctrl+Shift+R)
    const _nav=performance.getEntriesByType('navigation')[0];
    if(_nav&&_nav.type==='reload'&&_nav.transferSize>0){
      localStorage.removeItem('pbd_session');
    }
    // Cache-clear sync: if no session token, clear IndexedDB
    if(!localStorage.getItem('pbd_session')){
      await clearAllPhotos();
    }
    localStorage.setItem('pbd_session','1');
    await openPhotoDB();
    const saved=await dbGetAllPhotos();
    saved.forEach(ph=>{
      // Restore collection map
      if(ph.slotId) collectionMap[ph.slotId]=ph;
      // Create image for in-memory display
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        c.width=img.width;c.height=img.height;
        c.getContext('2d').drawImage(img,0,0);
        photos.push({canvas:c,label:ph.label,location:ph.location,dist:ph.dist,slotId:ph.slotId,timestamp:ph.timestamp});
        document.getElementById('photo-count').textContent=`📸 ${photos.length}枚`;
        updateAlbum();
      };
      img.src=ph.dataUrl;
    });
    if(saved.length===0) updateAlbum();
  }catch(e){
    console.warn('IndexedDB not available, photos will not persist:',e);
    updateAlbum();
  }
}

const slCanvas=document.getElementById('speed-lines-c');
const slCtx=slCanvas.getContext('2d');
slCanvas.width=innerWidth;slCanvas.height=innerHeight;

function drawSpeedLines(progress,alpha){
  slCtx.clearRect(0,0,innerWidth,innerHeight);
  const cx=innerWidth/2,cy=innerHeight/2;
  for(let i=0;i<80;i++){
    const angle=i/80*Math.PI*2;
    const len=40+progress*280*(Math.random()*.5+.75);
    const startR=15+progress*80;const endR=startR+len;
    const x1=cx+Math.cos(angle)*startR,y1=cy+Math.sin(angle)*startR;
    const x2=cx+Math.cos(angle)*endR,y2=cy+Math.sin(angle)*endR;
    const grd=slCtx.createLinearGradient(x1,y1,x2,y2);
    grd.addColorStop(0,'rgba(180,220,255,0)');grd.addColorStop(.5,`rgba(180,220,255,${alpha*.4})`);grd.addColorStop(1,`rgba(255,255,255,${alpha})`);
    slCtx.beginPath();slCtx.moveTo(x1,y1);slCtx.lineTo(x2,y2);slCtx.strokeStyle=grd;slCtx.lineWidth=Math.random()*1.2+.2;slCtx.stroke();
  }
}

function startLanding(planetId){
  if(camState!=='orbit')return;
  camState='landing';
  document.getElementById('info-panel').classList.remove('show');
  const pd=PLANET_MAP[planetId];
  const mesh=planetMeshes[planetId];
  if(!mesh){camState='orbit';return;}

  const planetPos=mesh.getWorldPosition(new THREE.Vector3());
  const startR=spherical.r;
  const startTarget=orbitTarget.clone();

  // Warp sound
  playSfx('warp');

  // Phase 1: zoom in (2s)
  let t=0;
  const phase1=()=>{
    t=Math.min(1,t+.012);
    const e=1-(1-t)*(1-t);
    orbitTarget.lerpVectors(startTarget,planetPos,e*.5);
    spherical.r=lerp(startR,pd.r*3,e);
    updateCamera();
    if(t<1){requestAnimationFrame(phase1);}else{phase2();}
  };
  requestAnimationFrame(phase1);

  // Show cockpit during approach
  showCockpit(true);

  // Phase 2: warp lines (1.2s)
  function phase2(){
    slCanvas.style.opacity='1';
    let p=0;const p2s=performance.now();
    function p2(){
      p=Math.min(1,(performance.now()-p2s)/1200);
      const e=p<.5?4*p*p*p:(p-1)*(2*p-2)*(2*p-2)+1;
      drawSpeedLines(e,e);
      document.getElementById('land-overlay').style.opacity=(e*.5).toString();
      if(p<1)requestAnimationFrame(p2);else phase3();
    }
    requestAnimationFrame(p2);
  }

  // Phase 3: flash + message
  function phase3(){
    slCanvas.style.opacity='0';slCtx.clearRect(0,0,innerWidth,innerHeight);
    const flash=document.getElementById('flash');
    flash.style.transition='none';flash.style.opacity='1';
    setTimeout(()=>{
      flash.style.transition='opacity .6s';flash.style.opacity='0';
      document.getElementById('land-overlay').style.opacity='0';
      playSfx('landing');
      showMsg(`${pd.nameJa}\n着陸しました`,2200,pd.colorHex);
      setTimeout(()=>{
        camState='surface';
        enterSurfaceMode(pd);
      },800);
    },80);
  }
}

  // Altitude: distance from nearest planet surface

function startReturnJourney(){
  camState='returning';
  cockpitMode=false;
  showCockpit(true); // keep cockpit for cinematic return
  simSpeed=0; // freeze orbital motion during return montage
  showMsg('地球へ——帰還の旅が始まる',3000,'#4fc3f7');

  // Build montage from visited planets (reverse order), always end at earth
  const visitMsgs={
    mercury:'水星——灼熱の荒野を振り返る',
    venus:'金星——硫酸の雲の下を通過',
    earth:'地球——見えてきた。あの青い点が',
    mars:'火星——赤い砂漠よ、さらば',
    jupiter:'木星——嵐は今日も続いている',
    saturn:'土星——リングの美しさよ、さらば',
    uranus:'天王星——氷の巨人を横目に',
    neptune:'海王星——太陽系の最果てを通過',
  };
  const fallbackPlaces=['neptune','saturn','jupiter','mars','earth'];
  const visited=visitedPlanets.length>0?[...visitedPlanets]:[];
  // Ensure earth is last and not duplicated
  const filtered=visited.filter(id=>id!=='earth');
  filtered.reverse();
  filtered.push('earth');
  // If player visited nothing, use fallback
  const keyPlaces=(filtered.length>1?filtered:fallbackPlaces).map(id=>({
    id,
    msg:visitMsgs[id]||`${PLANET_MAP[id]?.nameJa||id}を通過`,
  }));

  let idx=0;
  let elapsed=0;
  const montageInterval=3500;

  function nextMontage(){
    if(idx>=keyPlaces.length){startReentry();return;}
    const kp=keyPlaces[idx++];
    const m=planetMeshes[kp.id];
    if(m){
      const pos=m.getWorldPosition(new THREE.Vector3());
      orbitTarget.copy(pos);
      spherical.r=PLANET_MAP[kp.id].r*15+50;
      spherical.theta+=1.2;
      updateCamera();
    }
    const sunDist=camera.position.length();
    showMsg(`${kp.msg}\n太陽から光で${formatLight(sunDist)}`,2500,'#b0c8e8');
    setTimeout(nextMontage,montageInterval);
  }

  setTimeout(nextMontage,3500);
}

function startReentry(){
  camState='reentry';
  showCockpit(true);
  const earth=planetMeshes['earth'];
  const earthPos=earth.getWorldPosition(new THREE.Vector3());
  orbitTarget.copy(earthPos);
  playSfx('warp');

  // Reentry overlay elements
  const fireEl=document.createElement('div');
  fireEl.id='reentry-fire';
  fireEl.style.cssText='position:fixed;inset:0;z-index:55;pointer-events:none;opacity:0;transition:opacity .5s';
  document.body.appendChild(fireEl);

  const altEl=document.createElement('div');
  altEl.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:56;pointer-events:none;font-size:14px;color:#ff8844;letter-spacing:.15em;text-align:center;opacity:0;transition:opacity .5s';
  document.body.appendChild(altEl);

  // Unified approach (7s): Earth continuously zooms in while vibration gradually builds
  showMsg('大気圏突入シーケンス開始\n高度 400km  速度 7.8 km/s',2500,'#4fc3f7');
  const startR=spherical.r;
  const targetR=PLANET_MAP['earth'].r*2;
  const APPROACH_MS=7000;
  const approachStart=performance.now();
  let phase2Shown=false;

  function approachFrame(){
    const t=Math.min(1,(performance.now()-approachStart)/APPROACH_MS);

    // Continuous linear zoom toward Earth
    spherical.r=lerp(startR,targetR,t);
    updateCamera();

    // Speed lines ramp up steadily
    slCanvas.style.opacity=Math.min(0.8,t*1.5).toString();
    drawSpeedLines(t*0.6,t*0.4);

    // Vibration: quadratic rise starting at t=0.3, max 0.8 at t=1
    const shakeFactor=Math.max(0,(t-0.3)/0.7);
    reentryShake=Math.pow(shakeFactor,2)*0.8;

    // Cockpit micro-vibration (yaw/pitch nudge, same curve)
    if(cockpitMode&&shakeFactor>0){
      const vib=Math.pow(shakeFactor,2)*0.003;
      cockpitYaw+=Math.sin(performance.now()*0.031)*vib;
      cockpitPitch+=Math.cos(performance.now()*0.043)*vib*0.6;
    }

    // Plasma fire: fades in from t=0.5
    if(t>0.5){
      const fp=(t-0.5)/0.5;
      const r1=Math.floor(255*fp),g1=Math.floor(100*fp);
      const a1=(fp*0.55).toFixed(2),a2=(fp*0.25).toFixed(2);
      fireEl.style.opacity='1';
      fireEl.style.background=`radial-gradient(ellipse at 50% 60%,rgba(${r1},${g1},0,0) 20%,rgba(255,60,0,${a1}) 60%,rgba(255,200,0,${a2}) 100%)`;
    }

    // Altitude readout: appears at t=0.4, tracks full descent
    if(t>0.4){
      altEl.style.opacity='1';
      const alt=Math.floor(lerp(400,80,t));
      const vel=lerp(7.8,2.5,t).toFixed(1);
      const tempStr=t>0.6?` | ${Math.floor(lerp(1500,3000,(t-0.6)/0.4))}°C`:'';
      altEl.innerHTML=`ALT ${alt}km | VEL ${vel}km/s${tempStr}`;
    }

    // Phase 2 message fires once at t≈0.45
    if(!phase2Shown&&t>=0.45){
      phase2Shown=true;
      showMsg('高度 80km — プラズマ加熱開始\n通信途絶（ブラックアウト）',2500,'#ff8844');
    }

    if(t<1) requestAnimationFrame(approachFrame); else stage3();
  }
  setTimeout(()=>requestAnimationFrame(approachFrame),2800);

  // Stage 3: Peak heat + flash (2s)
  function stage3(){
    reentryShake=0;
    playSfx('landing');
    showMsg('炎の中——地球へ',2000,'#ff6622');
    altEl.innerHTML='ALT 15km | VEL 0.8km/s | 減速中...';

    const s3Start=performance.now();
    function s3frame(){
      const elapsed=(performance.now()-s3Start)/2000;
      const p=Math.min(1,elapsed);
      const fade=1-p;

      fireEl.style.background=`radial-gradient(ellipse at 50% 60%,rgba(255,200,80,0) 20%,rgba(255,60,0,${(fade*0.5).toFixed(2)}) 60%,rgba(255,200,0,${(fade*0.2).toFixed(2)}) 100%)`;
      slCanvas.style.opacity=(fade*0.3).toString();
      drawSpeedLines(fade*0.3,fade*0.2);

      // Zoom closer
      spherical.r=lerp(PLANET_MAP['earth'].r*2,PLANET_MAP['earth'].r*0.5,p*p);
      updateCamera();

      if(p<1) requestAnimationFrame(s3frame); else stage4();
    }
    requestAnimationFrame(s3frame);
  }

  // Stage 4: Cleanup + flash + ending
  function stage4(){
    slCanvas.style.opacity='0';slCtx.clearRect(0,0,innerWidth,innerHeight);
    const flash=document.getElementById('flash');
    flash.style.transition='none';flash.style.opacity='1';
    setTimeout(()=>{
      flash.style.transition='opacity 1s';flash.style.opacity='0';
      fireEl.style.transition='opacity 1s';fireEl.style.opacity='0';
      altEl.style.opacity='0';
      setTimeout(()=>{
        document.body.removeChild(fireEl);
        document.body.removeChild(altEl);
        showCockpit(false);
        triggerEnding();
      },1200);
    },200);
  }
}
