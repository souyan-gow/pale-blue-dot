<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽系 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:sans-serif;color:#e0eaff}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,4,16,.9),transparent);transition:opacity .5s}
#title{font-size:17px;font-weight:bold;letter-spacing:.15em;color:#4fc3f7}
#subtitle{font-size:10px;color:#446;letter-spacing:.1em;margin-top:2px}
#controls{display:flex;align-items:center;gap:14px}
#controls label{font-size:11px;color:#446}
input[type=range]{width:90px;height:3px;-webkit-appearance:none;background:linear-gradient(90deg,#4fc3f7,#112);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#4fc3f7;box-shadow:0 0 6px #4fc3f7;cursor:pointer}
.ibtn{width:30px;height:30px;border-radius:50%;border:1.5px solid #4fc3f7;background:transparent;color:#4fc3f7;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn:hover{background:rgba(79,195,247,.18)}
#panel{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:10;width:260px;background:rgba(3,10,28,.93);border:1px solid rgba(79,195,247,.22);border-radius:14px;padding:20px 18px;display:none;backdrop-filter:blur(12px);transition:opacity .3s}
#panel.show{display:block}
#pcls{position:absolute;top:10px;right:12px;background:none;border:none;color:#446;font-size:16px;cursor:pointer;width:auto;height:auto;border-radius:0;padding:0}
#pcls:hover{color:#fff}
#pdot{width:54px;height:54px;border-radius:50%;margin:0 auto 10px}
#pen{font-size:10px;letter-spacing:.18em;color:#446;text-align:center}
#pja{font-size:20px;text-align:center;margin-bottom:14px}
.f{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.f:last-child{border-bottom:none}
.fk{color:#557}.fv{color:#4fc3f7;font-size:11px;font-family:monospace}
#travel-btn{display:block;width:100%;margin-top:16px;padding:10px;background:linear-gradient(135deg,rgba(79,195,247,.2),rgba(79,195,247,.05));border:1px solid rgba(79,195,247,.5);border-radius:8px;color:#4fc3f7;font-size:13px;letter-spacing:.08em;cursor:pointer;transition:all .2s;text-align:center}
#travel-btn:hover{background:linear-gradient(135deg,rgba(79,195,247,.35),rgba(79,195,247,.15));box-shadow:0 0 20px rgba(79,195,247,.3);transform:translateY(-1px)}
#legend{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;transition:opacity .5s}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:#557;cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
.leg:hover{color:#fff;background:rgba(79,195,247,.08);border-color:rgba(79,195,247,.2)}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);font-size:11px;color:#224;pointer-events:none;white-space:nowrap;transition:opacity .5s}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px}
#loading p{color:#4fc3f7;font-size:13px;letter-spacing:.1em}
#lbar{width:200px;height:2px;background:#111;border-radius:2px}
#lprog{height:100%;background:#4fc3f7;border-radius:2px;transition:width .3s;width:0%}

/* ── LANDING OVERLAY ── */
#land-overlay{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,#000 100%)}
#land-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:55;text-align:center;opacity:0;pointer-events:none}
#land-msg .lm-name{font-size:clamp(24px,4vw,48px);font-weight:bold;letter-spacing:.2em;color:#fff;text-shadow:0 0 30px currentColor}
#land-msg .lm-sub{font-size:13px;letter-spacing:.15em;color:#4fc3f7;margin-top:8px;opacity:.8}
#speed-lines{position:fixed;inset:0;z-index:52;pointer-events:none;opacity:0}

/* ── SURFACE VIEW ── */
#surface{position:fixed;inset:0;z-index:40;display:none}
#surface canvas{width:100%;height:100%;display:block}
#surface-ui{position:fixed;inset:0;z-index:45;pointer-events:none}
#surface-hud{position:absolute;top:0;left:0;right:0;padding:18px 28px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
#surface-planet-name{font-size:clamp(16px,2.5vw,26px);font-weight:bold;letter-spacing:.15em}
#surface-coords{font-size:11px;color:#4fc3f7;font-family:monospace;margin-top:4px;opacity:.8}
#surface-desc{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;max-width:500px;font-size:13px;color:rgba(255,255,255,.75);line-height:1.7;letter-spacing:.03em;background:rgba(0,0,0,.5);padding:14px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
#back-btn{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);pointer-events:all;padding:10px 28px;background:rgba(3,10,28,.85);border:1px solid rgba(79,195,247,.4);border-radius:24px;color:#4fc3f7;font-size:13px;letter-spacing:.1em;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
#back-btn:hover{background:rgba(79,195,247,.15);box-shadow:0 0 18px rgba(79,195,247,.3)}
#surface-look{position:absolute;bottom:80px;right:24px;pointer-events:all;display:flex;flex-direction:column;gap:8px}
.look-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);pointer-events:all}
.look-btn:hover{background:rgba(255,255,255,.15)}
#saturn-calm-btn{
  position:absolute;bottom:80px;left:24px;pointer-events:all;
  padding:10px 18px;
  background:linear-gradient(135deg,rgba(212,192,128,.18),rgba(212,192,128,.05));
  border:1px solid rgba(212,192,128,.55);border-radius:24px;
  color:#e8d890;font-size:12px;letter-spacing:.08em;cursor:pointer;
  backdrop-filter:blur(8px);transition:all .35s;display:none;
  white-space:nowrap;
}
#saturn-calm-btn:hover{background:linear-gradient(135deg,rgba(212,192,128,.35),rgba(212,192,128,.12));box-shadow:0 0 20px rgba(212,192,128,.35);}
#saturn-calm-btn.calm-active{
  background:linear-gradient(135deg,rgba(100,180,255,.18),rgba(100,180,255,.05));
  border-color:rgba(100,180,255,.6);color:#a8d8ff;
}
#saturn-calm-btn.calm-active:hover{background:linear-gradient(135deg,rgba(100,180,255,.32),rgba(100,180,255,.12));box-shadow:0 0 20px rgba(100,180,255,.35);}
</style>
</head>
<body>
<div id="loading"><p id="load-msg">テクスチャ生成中...</p><div id="lbar"><div id="lprog"></div></div></div>
<canvas id="c"></canvas>

<div id="ui">

<div id="land-msg">

<!-- Surface view -->
<div id="surface">

        <div id="surface-planet-name"></div>

    </div>
    <div id="surface-desc"></div>
    <div id="surface-look">
      <button class="look-btn" id="look-up">↑</button>
      <button class="look-btn" id="look-down">↓</button>
      <button class="look-btn" id="look-left">←</button>
      <button class="look-btn" id="look-right">→</button>
    </div>
    <button id="back-btn">← 太陽系に戻る</button>
    <button id="saturn-calm-btn">🌀 嵐を静める &amp; リングを見る</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// PLANET DATA

const SUN_DATA={nameJa:'太陽',nameEn:'SUN',color:'#FDB813',facts:[['直径','1,392,700 km'],['表面温度','5,500 °C'],['コア温度','1,500万 °C'],['年齢','約46億年'],['惑星数','8']]};
// ── SCALE NOTE ──────────────────────────────────────────────────────────
// Earth radius = 1.0 scene unit (real: 6,371 km)
// All planet radii are true volume-proportional to Earth.
// Sun radius = 109.3 (real ratio: 696,340 / 6,371 = 109.3×)
// Orbit distances: orbitR = 409.3 * realAU  → 完全にAU比を保持
//   (地球軌道=409.3 scene units, 海王星=12307.7 scene units)
const SUN_SCENE_R = 109.3;
const EARTH_ORBIT = 409.3; // 1 AU in scene units
const PDATA=[
  // orbitR = EARTH_ORBIT * realAU  → 距離比は実際のAU比と完全一致
  {nameJa:'水星',nameEn:'MERCURY',color:'#9a9a9a',r:0.383,orbitR:158.4,  period:2.4,  tilt:0.034,

   facts:[['直径','4,879 km'],['公転周期','87.97日'],['衛星数','0'],['平均温度','167°C']]},
  {nameJa:'金星',nameEn:'VENUS',color:'#d4a847',r:0.950,orbitR:295.9,  period:6.2,  tilt:177.4,

   desc:'硫酸の雲に包まれた金星の地表。92気圧という超高圧と460°Cの熱地獄。オレンジ色に染まった空の下、溶岩平原と山々がどこまでも続く。',
   facts:[['直径','12,104 km'],['公転周期','224.7日'],['衛星数','0'],['平均温度','464°C']]},
  {nameJa:'地球',nameEn:'EARTH',color:'#2a6fd4',r:1.000,orbitR:409.3,  period:10,   tilt:23.4,
   skyColor:[30,80,160],horizonColor:[100,160,220],groundColor:[40,100,40],
   desc:'生命あふれる青い星、地球。緑の草原が広がり、白い雲が流れ、青い空に太陽が輝く。138億年の宇宙の歴史の中で、生命が確認されている唯一の惑星。',
   facts:[['直径','12,742 km'],['公転周期','365.25日'],['衛星数','1'],['平均温度','15°C']]},
  {nameJa:'火星',nameEn:'MARS',color:'#b5391a',r:0.532,orbitR:623.8,  period:18.8, tilt:25.2,
   skyColor:[140,80,50],horizonColor:[180,120,70],groundColor:[150,80,50],
   desc:'赤い砂漠が広がる火星の地表。ピンク色の空の下、玄武岩の岩がそびえ立つ。遠くには太陽系最大の火山オリンポス・モンスの影が見える。',
   facts:[['直径','6,779 km'],['公転周期','686.97日'],['衛星数','2'],['平均温度','-65°C']]},
  {nameJa:'木星',nameEn:'JUPITER',color:'#c4935a',r:10.973,orbitR:2129.6, period:118,  tilt:3.1,
   skyColor:[160,120,70],horizonColor:[200,150,90],groundColor:[180,130,80],
   desc:'木星に地表は存在しない。大気を降下していくにつれて圧力と温度が急上昇し、ガスが液体金属水素へと変わる。渦巻く雲の嵐が永遠に続く世界。',
   facts:[['直径','139,820 km'],['公転周期','11.86年'],['衛星数','95'],['平均温度','-110°C']]},
  {nameJa:'土星',nameEn:'SATURN',color:'#c8b560',r:9.140,orbitR:3903.5, period:295,  tilt:26.7,ring:true,
   skyColor:[170,155,100],horizonColor:[200,185,120],groundColor:[190,170,110],
   desc:'土星の上層雲の中から見上げると、巨大なリングが空を二分する圧巻の光景。風速1800km/hの嵐が吹き荒れる中、黄金色の雲が果てしなく広がる。',

  {nameJa:'天王星',nameEn:'URANUS',color:'#7acfcf',r:3.981,orbitR:7854.5, period:840,  tilt:97.8,
   skyColor:[60,160,160],horizonColor:[100,200,200],groundColor:[80,180,180],
   desc:'自転軸が98°傾いた天王星では、1極が42年間もの夜を迎える。水と氷とメタンが超臨界状態で存在する「氷の巨人」の雲頂に立つと、薄青の空が静かに広がる。',
   facts:[['直径','50,724 km'],['公転周期','84.01年'],['衛星数','28'],['平均温度','-195°C']]},
  {nameJa:'海王星',nameEn:'NEPTUNE',color:'#2f4db5',r:3.865,orbitR:12307.7,period:1648, tilt:28.3,

   desc:'太陽系最強の風速2100km/hが吹き荒れる海王星。深い青の雲の中に大暗斑という巨大嵐が渦を巻き、太陽から45億km離れたこの世界では太陽は小さな星に見える。',

];

// ═══════════════════════════════════════════════════════════════════════════
// NOISE / TEXTURE UTILS
// ═══════════════════════════════════════════════════════════════════════════
const TEX_SIZE=512;
function mkCanvas(w=TEX_SIZE,h=TEX_SIZE){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function smoothNoise(x,y,seed=0){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  function h(a,b){let n=a*1619+b*31337+seed*1013;n=(n^(n>>13))*(n*n*15731+789221)+1376312589;return((n>>16)&0xffff)/0xffff;}
  return h(ix,iy)*(1-u)*(1-v)+h(ix+1,iy)*u*(1-v)+h(ix,iy+1)*(1-u)*v+h(ix+1,iy+1)*u*v;
}
function fbm(x,y,octs=6,seed=0){let v=0,a=.5,f=1;for(let i=0;i<octs;i++){v+=a*smoothNoise(x*f,y*f,seed+i*100);a*=.5;f*=2.1;}return v;}
function warpFbm(x,y,octs,seed){const qx=fbm(x,y,octs,seed),qy=fbm(x+5.2,y+1.3,octs,seed+50);return fbm(x+1.7*qx,y+1.7*qy,octs,seed+200);}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function mix3(a,b,t){return[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];}

// ─── MERCURY ──────────────────────────────────────────────────────────────
function texMercury(){
  const S=1024;const c=mkCanvas(S,S),g=c.getContext('2d');
  const id=g.createImageData(S,S),d=id.data;
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){
    const nx=x/S*5,ny=y/S*5;
    const macro=fbm(nx,ny,5,1),meso=fbm(nx*2.3,ny*2.3,4,110),micro=fbm(nx*6,ny*6,3,220);
    const t=macro*.55+meso*.3+micro*.15;
    const isLow=t<.42;
    const base=isLow?[clamp(85+t*120|0,0,255),clamp(78+t*100|0,0,255),clamp(70+t*90|0,0,255)]
                    :[clamp(95+t*110|0,0,255),clamp(88+t*95|0,0,255),clamp(78+t*85|0,0,255)];
    const rf=smoothNoise(nx*4,ny*4,330)>.62?8:0;
    const i=(y*S+x)*4;d[i]=clamp(base[0]+rf,0,255);d[i+1]=clamp(base[1],0,255);d[i+2]=clamp(base[2],0,255);d[i+3]=255;
  }
  g.putImageData(id,0,0);
  const craters=[{cx:.55,cy:.28,r:.072,ray:true},{cx:.22,cy:.62,r:.058},{cx:.73,cy:.68,r:.042,ray:true},
    {cx:.12,cy:.18,r:.065},{cx:.82,cy:.32,r:.038},{cx:.38,cy:.78,r:.048},{cx:.65,cy:.14,r:.032},
    {cx:.48,cy:.50,r:.025},{cx:.30,cy:.42,r:.035},{cx:.88,cy:.75,r:.028},{cx:.18,cy:.85,r:.040},
    {cx:.60,cy:.55,r:.020},{cx:.45,cy:.10,r:.055,ray:true},{cx:.78,cy:.88,r:.018},{cx:.95,cy:.50,r:.022}];
  craters.forEach(({cx,cy,r,ray})=>{
    const px=cx*S,py=cy*S,pr=r*S;
    const ejBlank=g.createRadialGradient(px,py,pr*.7,px,py,pr*2.2);
    ejBlank.addColorStop(0,'rgba(200,195,185,.0)');ejBlank.addColorStop(.4,'rgba(200,195,185,.18)');ejBlank.addColorStop(1,'rgba(200,195,185,.0)');
    g.beginPath();g.arc(px,py,pr*2.2,0,Math.PI*2);g.fillStyle=ejBlank;g.fill();
    if(ray){for(let ri=0;ri<12;ri++){const ra=ri/12*Math.PI*2,rlen=(0.5+Math.random()*.8)*S*.12;g.save();g.globalAlpha=.12+Math.random()*.1;g.strokeStyle='rgba(210,205,195,1)';g.lineWidth=pr*.08*(1-ri/18);g.beginPath();g.moveTo(px+Math.cos(ra)*pr*1.1,py+Math.sin(ra)*pr*1.1);g.lineTo(px+Math.cos(ra+.15)*rlen,py+Math.sin(ra+.15)*rlen);g.stroke();g.restore();}}
    const rim=g.createRadialGradient(px,py,pr*.78,px,py,pr*1.08);rim.addColorStop(0,'rgba(0,0,0,0)');rim.addColorStop(.7,'rgba(210,205,195,.55)');rim.addColorStop(1,'rgba(210,205,195,0)');g.beginPath();g.arc(px,py,pr*1.08,0,Math.PI*2);g.fillStyle=rim;g.fill();
    const floor=g.createRadialGradient(px-pr*.2,py-pr*.2,0,px,py,pr*.85);floor.addColorStop(0,'rgba(55,50,45,.0)');floor.addColorStop(.5,'rgba(45,42,38,.5)');floor.addColorStop(1,'rgba(40,38,34,.65)');g.beginPath();g.arc(px,py,pr*.85,0,Math.PI*2);g.fillStyle=floor;g.fill();
    if(pr>S*.04){const peak=g.createRadialGradient(px,py,0,px,py,pr*.22);peak.addColorStop(0,'rgba(190,185,175,.7)');peak.addColorStop(1,'rgba(190,185,175,0)');g.beginPath();g.arc(px,py,pr*.22,0,Math.PI*2);g.fillStyle=peak;g.fill();}
  });
  return new THREE.CanvasTexture(c);
}

// ─── VENUS ────────────────────────────────────────────────────────────────
function texVenus(){
  const S=1024;const c=mkCanvas(S,S),g=c.getContext('2d');
  const id=g.createImageData(S,S),d=id.data;
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){
    const nx=x/S*4,ny=y/S*4,yf=y/S;
    const warp=warpFbm(nx,ny*1.8,6,2),fast=fbm(nx*2+warp*.8,ny*3+warp*.4,5,150);
    const band=Math.sin(yf*Math.PI*12+warp*3)*.5+.5,vortex=Math.sin(yf*Math.PI*5+warp*5)*.5+.5;

function animate_value(from,to,dur,easing,onUpdate,onDone){
  const start=performance.now();
  function step(now){
    let t=Math.min(1,(now-start)/dur);
    if(easing==='ease-out')t=1-(1-t)*(1-t);
    if(easing==='ease-in')t=t*t;
    if(easing==='ease-in-out')t=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    onUpdate(from+(to-from)*t);
    if(t<1)requestAnimationFrame(step);else onDone&&onDone();
  }
  requestAnimationFrame(step);
}

function drawSpeedLines(progress,alpha){
  slCtx.clearRect(0,0,innerWidth,innerHeight);
  const cx=innerWidth/2,cy=innerHeight/2;
  const count=80;
  for(let i=0;i<count;i++){
    const angle=i/count*Math.PI*2;
    const speed=progress;
    const lineLen=50+speed*300*(Math.random()*.5+.75);
    const startR=20+speed*100;
    const endR=startR+lineLen;
    const x1=cx+Math.cos(angle)*startR,y1=cy+Math.sin(angle)*startR;
    const x2=cx+Math.cos(angle)*endR,y2=cy+Math.sin(angle)*endR;
    const grd=slCtx.createLinearGradient(x1,y1,x2,y2);
    grd.addColorStop(0,'rgba(200,230,255,0)');grd.addColorStop(.5,`rgba(200,230,255,${alpha*.5})`);grd.addColorStop(1,`rgba(255,255,255,${alpha})`);
    slCtx.beginPath();slCtx.moveTo(x1,y1);slCtx.lineTo(x2,y2);slCtx.strokeStyle=grd;slCtx.lineWidth=Math.random()*1.5+.3;slCtx.stroke();
  }
}

    approachPhase=Math.min(1,(now-zoomStart)/zoomDur);
    const ease=1-(1-approachPhase)*(1-approachPhase);
    spherical.r=startR+(targetR-startR)*ease;
    orbitTarget.lerp(planetWorldPos,ease*.3);
    updateCamera();
    if(approachPhase<1){requestAnimationFrame(zoomStep);}

    function p2step(now){
      p2=Math.min(1,(now-p2start)/p2dur);

      drawSpeedLines(ease,ease);
      // vignette
      overlay.style.opacity=(ease*.6).toString();
      if(p2<1){requestAnimationFrame(p2step);}else{phase3();}

  }

          overlay.style.transition='opacity .8s';overlay.style.opacity='0';

        },1200);
      },800);
    },100);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SURFACE VIEW – Three.js scene
// ═══════════════════════════════════════════════════════════════════════════
let surfaceRenderer=null,surfaceScene=null,surfaceCamera=null,surfaceClock=null;
let surfaceYaw=0,surfacePitch=0,surfaceDragging=false,surfaceLastMouse={x:0,y:0};
let surfaceMeshes=[];

function buildSurfaceScene(planetIdx){
  const pd=PDATA[planetIdx];
  surfaceScene=new THREE.Scene();
  surfaceClock=new THREE.Clock();

  const sc_el=document.getElementById('sc');
  if(!surfaceRenderer){
    surfaceRenderer=new THREE.WebGLRenderer({canvas:sc_el,antialias:true});
    surfaceRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  }
  surfaceRenderer.setSize(innerWidth,innerHeight);
  surfaceRenderer.toneMapping=THREE.ACESFilmicToneMapping;
  surfaceRenderer.toneMappingExposure=pd.nameEn==='VENUS'?1.8:pd.nameEn==='EARTH'?1.4:1.1;

  surfaceCamera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.01,5000);
  surfaceCamera.position.set(0,1.7,0);
  surfaceYaw=0;surfacePitch=0;

  const [sr,sg,sb]=pd.skyColor,[hr,hg,hb]=pd.horizonColor;
  // Sky dome
  const skyCanvas=mkCanvas(1024,512);const skyG=skyCanvas.getContext('2d');
  const skyGrad=skyG.createLinearGradient(0,0,0,512);
  skyGrad.addColorStop(0,`rgb(${Math.max(0,sr-30)},${Math.max(0,sg-30)},${Math.max(0,sb-30)})`);
  skyGrad.addColorStop(.5,`rgb(${sr},${sg},${sb})`);
  skyGrad.addColorStop(1,`rgb(${hr},${hg},${hb})`);
  skyG.fillStyle=skyGrad;skyG.fillRect(0,0,1024,512);
  // Stars in sky for dark planets
  if(sr<60){for(let i=0;i<800;i++){const x=Math.random()*1024,y=Math.random()*200,r=Math.random()*1.2+.2;skyG.beginPath();skyG.arc(x,y,r,0,Math.PI*2);skyG.fillStyle=`rgba(255,255,255,${Math.random()*.8+.2})`;skyG.fill();}}
  const skyTex=new THREE.CanvasTexture(skyCanvas);
  const skyDome=new THREE.Mesh(new THREE.SphereGeometry(1000,32,16),new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,depthWrite:false}));
  surfaceScene.add(skyDome);surfaceMeshes.push(skyDome);

  // Ground – heightmap terrain
  const terrainSize=200;const terrainSegs=80;
  const [gr,gg2,gb]=pd.groundColor;
  const groundCanvas=mkCanvas(512,512);const gCtx=groundCanvas.getContext('2d');
  const gId=gCtx.createImageData(512,512);const gD=gId.data;
  for(let y=0;y<512;y++)for(let x=0;x<512;x++){
    const n=fbm(x/512*8,y/512*8,6,planetIdx*137);
    const rv=Math.floor(gr+n*40-20),gv2=Math.floor(gg2+n*30-15),bv=Math.floor(gb+n*25-12),ii=(y*512+x)*4;
    gD[ii]=Math.max(0,Math.min(255,rv));gD[ii+1]=Math.max(0,Math.min(255,gv2));gD[ii+2]=Math.max(0,Math.min(255,bv));gD[ii+3]=255;
  }
  gCtx.putImageData(gId,0,0);
  const groundTex=new THREE.CanvasTexture(groundCanvas);groundTex.wrapS=groundTex.wrapT=THREE.RepeatWrapping;groundTex.repeat.set(4,4);

  // Build heightfield
  const geoG=new THREE.PlaneGeometry(terrainSize,terrainSize,terrainSegs,terrainSegs);
  geoG.rotateX(-Math.PI/2);
  const posAttr=geoG.attributes.position;
  for(let i=0;i<posAttr.count;i++){
    const x=posAttr.getX(i)/terrainSize*6+planetIdx,z=posAttr.getZ(i)/terrainSize*6+planetIdx*2;
    const h=fbm(x,z,7,planetIdx*42+5)*.0; // flat base; bumps via normal map feel
    // Add some height variation for rocky planets
    const bump=(pd.nameEn==='MERCURY'||pd.nameEn==='MARS')?fbm(x*3,z*3,5,planetIdx*17)*.8:
               pd.nameEn==='EARTH'?fbm(x*2,z*2,4,planetIdx*17)*.3:
               pd.nameEn==='VENUS'?fbm(x*2,z*2,5,planetIdx*17)*.5:0.05;
    posAttr.setY(i,bump-bump*.5);
  }
  geoG.computeVertexNormals();
  const ground=new THREE.Mesh(geoG,new THREE.MeshStandardMaterial({map:groundTex,roughness:.95,metalness:.0}));
  ground.receiveShadow=true;surfaceScene.add(ground);surfaceMeshes.push(ground);

  // Rocks / terrain features
  if(pd.nameEn==='MERCURY'||pd.nameEn==='MARS'||pd.nameEn==='EARTH'){
    for(let i=0;i<35;i++){
      const rx=(Math.random()-.5)*40,rz=-5-Math.random()*60;
      const rSize=Math.random()*.4+.1+(pd.nameEn==='MARS'?.3:0);
      const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(rSize,0),new THREE.MeshStandardMaterial({color:new THREE.Color(gr/255*.9,gg2/255*.8,gb/255*.7),roughness:.95}));
      rock.position.set(rx,rSize*.4,rz);rock.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);rock.castShadow=true;
      surfaceScene.add(rock);surfaceMeshes.push(rock);
    }
  }
  // Trees for Earth
  if(pd.nameEn==='EARTH'){
    for(let i=0;i<20;i++){
      const tx=(Math.random()-.5)*50,tz=-3-Math.random()*50;
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.05,.08,.8,6),new THREE.MeshStandardMaterial({color:0x4a3020}));
      trunk.position.set(tx,.4,tz);
      const foliage=new THREE.Mesh(new THREE.ConeGeometry(.4+Math.random()*.3,1+Math.random()*.5,7),new THREE.MeshStandardMaterial({color:new THREE.Color(.1+Math.random()*.15,.35+Math.random()*.2,.1)}));
      foliage.position.y=.9;trunk.add(foliage);surfaceScene.add(trunk);surfaceMeshes.push(trunk);
    }
  }
  // Saturn rings visible in sky – multiple concentric arcs for realism
  if(pd.nameEn==='SATURN'){

    // ── STORM SKY DOME (初期状態: 嵐) ──────────────────────────────────
    // スカイドームを土星専用の嵐色で上書き（buildSurfaceScene内で作ったものを差し替え）
    // surfaceMeshes[0] がスカイドームなので material を更新
    function makeSaturnSkyTex(calm){
      const sc=mkCanvas(1024,512),sg2=sc.getContext('2d');
      if(calm){
        // 嵐後: 深い紺青〜青紫の澄んだ空。土星大気の実際の色に近い。
        const g=sg2.createLinearGradient(0,0,0,512);
        g.addColorStop(0,'rgb(15,20,60)');
        g.addColorStop(.25,'rgb(30,50,110)');
        g.addColorStop(.55,'rgb(55,85,160)');
        g.addColorStop(.8,'rgb(80,110,180)');
        g.addColorStop(1,'rgb(100,130,190)');
        sg2.fillStyle=g;sg2.fillRect(0,0,1024,512);
        // 星をいくつか
        for(let i=0;i<300;i++){
          sg2.beginPath();sg2.arc(Math.random()*1024,Math.random()*200,Math.random()*.9+.2,0,Math.PI*2);
          sg2.fillStyle=`rgba(255,255,255,${Math.random()*.6+.2})`;sg2.fill();
        }
        // リングの影帯（空の中央付近に薄い暗い横線）
        const shadow=sg2.createLinearGradient(0,200,0,280);
        shadow.addColorStop(0,'rgba(0,0,0,0)');shadow.addColorStop(.5,'rgba(0,0,0,.22)');shadow.addColorStop(1,'rgba(0,0,0,0)');
        sg2.fillStyle=shadow;sg2.fillRect(0,200,1024,80);
      } else {
        // 嵐中: 黄土〜茶色の濃い嵐雲
        const g=sg2.createLinearGradient(0,0,0,512);
        g.addColorStop(0,'rgb(80,65,20)');
        g.addColorStop(.3,'rgb(140,110,40)');
        g.addColorStop(.65,'rgb(175,140,60)');
        g.addColorStop(1,'rgb(195,160,75)');
        sg2.fillStyle=g;sg2.fillRect(0,0,1024,512);
        // 嵐の渦模様ノイズ
        for(let i=0;i<60;i++){
          const cx=Math.random()*1024,cy=50+Math.random()*350,cw=60+Math.random()*120,ch=20+Math.random()*50;
          const cg=sg2.createRadialGradient(cx,cy,0,cx,cy,cw);
          cg.addColorStop(0,`rgba(${160+Math.random()*40|0},${130+Math.random()*30|0},${50+Math.random()*20|0},.35)`);
          cg.addColorStop(1,'rgba(0,0,0,0)');
          sg2.fillStyle=cg;sg2.ellipse(cx,cy,cw,ch,Math.random()*.5,0,Math.PI*2);sg2.fill();
        }
      }
      return new THREE.CanvasTexture(sc);
    }

    // 初期スカイドームを嵐に差し替え
    if(surfaceMeshes[0]&&surfaceMeshes[0].material){
      surfaceMeshes[0].material.map=makeSaturnSkyTex(false);
      surfaceMeshes[0].material.needsUpdate=true;
    }

    // 霧も嵐に合わせる（土星は上書き）
    surfaceScene.fog=new THREE.Fog(new THREE.Color(0xb89040),5,45);

    // ── STORM PARTICLES ─────────────────────────────────────────────────
    const stormGeo=new THREE.BufferGeometry();const stormPos=[];
    for(let i=0;i<2000;i++){
      stormPos.push((Math.random()-.5)*120,Math.random()*20+0.5,(Math.random()-.5)*120);
    }
    stormGeo.setAttribute('position',new THREE.Float32BufferAttribute(stormPos,3));
    const stormMat=new THREE.PointsMaterial({color:0xc8a030,size:.6,transparent:true,opacity:.85,depthWrite:false,sizeAttenuation:true});
    const stormMesh=new THREE.Points(stormGeo,stormMat);
    stormMesh.userData.isSaturnStorm=true;
    surfaceScene.add(stormMesh);surfaceMeshes.push(stormMesh);

    // ── RING BAND in sky ────────────────────────────────────────────────
    // カメラから見える「空に浮かぶリングの帯」を正しく表現する。
    // RingGeometry を超巨大にするのではなく、
    // 空に横切る薄いプレーン帯として表現 → カメラに対して常に正面向き(Billboard)ではなく
    // 地平線に平行な角度で空を横断する帯メッシュを使う。

    // リング帯グループ (最初は不可視)
    const ringGroup=new THREE.Group();
    ringGroup.userData.isSaturnRingGroup=true;

    // 各リング帯: 空を水平に横切る細長い矩形板
    // カメラ(y=1.7)から空を見上げると、水平面がリングの断面として線に見える
    // PlaneGeometry を適切な高さ・幅・傾きで配置する
    const ringDefs=[
      {width:4000,height:1.2, yAngle:27, yPos:80,  color:0xe8d890, opacity:.55, name:'B ring'},
      {width:4000,height:0.5, yAngle:27, yPos:82,  color:0xfff0b0, opacity:.38, name:'A ring'},
      {width:4000,height:0.25,yAngle:27, yPos:78,  color:0xd4c060, opacity:.22, name:'C ring'},
      {width:4000,height:0.08,yAngle:27, yPos:83.5,color:0xfffde0, opacity:.50, name:'F ring'},
    ];

    ringDefs.forEach(rd=>{
      const rg=new THREE.PlaneGeometry(rd.width,rd.height,1,1);
      const rm=new THREE.MeshBasicMaterial({color:rd.color,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
      rm.userData.targetOpacity=rd.opacity;
      const rmesh=new THREE.Mesh(rg,rm);
      // 地平線に平行、土星軸傾き27°分だけ回転
      // XZ平面に寝かせてy軸方向に高く置く → 見上げるとリングの断面が見える
      rmesh.rotation.x=THREE.MathUtils.degToRad(90-rd.yAngle); // ほぼ垂直に近い角度で立てる
      rmesh.position.set(0,rd.yPos,-200); // 空の遠くに
      ringGroup.add(rmesh);
    });

    // Cassini Division (暗い帯): B ringとA ringの間に薄黒い帯
    const casGeo=new THREE.PlaneGeometry(4000,0.15,1,1);
    const casMat=new THREE.MeshBasicMaterial({color:0x111008,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
    casMat.userData.targetOpacity=.60;
    const casMesh=new THREE.Mesh(casGeo,casMat);
    casMesh.rotation.x=THREE.MathUtils.degToRad(90-27);
    casMesh.position.set(0,81,-200);
    ringGroup.add(casMesh);

    // リングの輝き（グロー効果）: B ringの上下に柔らかい光
    const glowGeo=new THREE.PlaneGeometry(4000,8,1,1);
    const glowMat=new THREE.MeshBasicMaterial({color:0xd4c060,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
    glowMat.userData.targetOpacity=.08;
    const glowMesh=new THREE.Mesh(glowGeo,glowMat);
    glowMesh.rotation.x=THREE.MathUtils.degToRad(90-27);
    glowMesh.position.set(0,80,-200);
    ringGroup.add(glowMesh);

    surfaceScene.add(ringGroup);
    surfaceMeshes.push(ringGroup);

    // ── skyTexRef: calm/storm 切替用に保持 ─────────────────────────────
    ringGroup.userData.makeSaturnSkyTex=makeSaturnSkyTex;
    ringGroup.userData.skyDomeRef=surfaceMeshes[0];
  }

  // Lighting – sun direction
  const sunDir=new THREE.DirectionalLight(0xfff5e0,pd.nameEn==='NEPTUNE'?.3:pd.nameEn==='URANUS'?.4:1.2);
  sunDir.position.set(50,80,-100);sunDir.castShadow=true;surfaceScene.add(sunDir);
  const ambCol=new THREE.Color(sr/512,sg/512,sb/512);
  surfaceScene.add(new THREE.AmbientLight(ambCol,pd.nameEn==='VENUS'?1.5:.7));

  // Fog / atmosphere
  const fogColor=new THREE.Color(hr/255,hg/255,hb/255);
  surfaceScene.fog=new THREE.Fog(fogColor,20,pd.nameEn==='VENUS'?80:pd.nameEn==='EARTH'?200:120);

  // Atmospheric particles (dust for Mars/Venus, clouds for Earth)
  if(pd.nameEn==='MARS'||pd.nameEn==='VENUS'){
    const dustGeo=new THREE.BufferGeometry();const dustPos=[];
    for(let i=0;i<300;i++){dustPos.push((Math.random()-.5)*80,Math.random()*8,(Math.random()-.5)*80);}
    dustGeo.setAttribute('position',new THREE.Float32BufferAttribute(dustPos,3));
    const dust=new THREE.Points(dustGeo,new THREE.PointsMaterial({color:pd.nameEn==='MARS'?0xcc8050:0xbbaa60,size:.15,transparent:true,opacity:.4}));
    surfaceScene.add(dust);surfaceMeshes.push(dust);
  }
  if(pd.nameEn==='EARTH'){
    const cloudGeo=new THREE.BufferGeometry();const cloudPos=[];
    for(let i=0;i<80;i++){cloudPos.push((Math.random()-.5)*200,12+Math.random()*15,(Math.random()-.5)*200);}
    cloudGeo.setAttribute('position',new THREE.Float32BufferAttribute(cloudPos,3));
    const clouds=new THREE.Points(cloudGeo,new THREE.PointsMaterial({color:0xffffff,size:4,transparent:true,opacity:.35,sizeAttenuation:true}));
    surfaceScene.add(clouds);surfaceMeshes.push(clouds);
  }
}

function enterSurface(planetIdx){
  surfaceActive=true;landingActive=false;
  const pd=PDATA[planetIdx];
  document.getElementById('surface').style.display='block';
  buildSurfaceScene(planetIdx);

  // HUD
  document.getElementById('surface-planet-name').textContent=pd.nameJa;
  document.getElementById('surface-planet-name').style.color=pd.color;
  const lat=(Math.random()*60-30).toFixed(2),lon=(Math.random()*360-180).toFixed(2);
  document.getElementById('surface-coords').textContent=`LAT ${lat}° / LON ${lon}°  ALT 1.7m`;
  document.getElementById('surface-desc').textContent=pd.desc;

  // Saturn-only calm mode button
  const calmBtn=document.getElementById('saturn-calm-btn');
  calmBtn.style.display=pd.nameEn==='SATURN'?'block':'none';
  calmBtn.classList.remove('calm-active');
  calmBtn.textContent='🌀 嵐を静める & リングを見る';
  let calmActive=false;
  let calmAnimId=null;

  function setCalmMode(on){
    calmActive=on;
    if(calmAnimId)cancelAnimationFrame(calmAnimId);

    let stormMeshRef=null,ringGroupRef=null;
    surfaceMeshes.forEach(m=>{
      if(m.userData&&m.userData.isSaturnStorm) stormMeshRef=m;
      if(m.userData&&m.userData.isSaturnRingGroup) ringGroupRef=m;
    });

    // 開始時の値を記録
    const stormStart = stormMeshRef ? stormMeshRef.material.opacity : (on?0.85:0);
    const stormEnd   = on ? 0 : 0.85;
    const fogNearStart= surfaceScene.fog ? surfaceScene.fog.near : (on?5:80);
    const fogFarStart = surfaceScene.fog ? surfaceScene.fog.far  : (on?45:400);
    const fogNearEnd  = on ? 80 : 5;
    const fogFarEnd   = on ? 400 : 45;
    const fogColorEnd = on ? new THREE.Color(0x1a2d6a) : new THREE.Color(0xb89040);

    const dur=2200, tStart=performance.now();

    function tween(now){
      const t=Math.min(1,(now-tStart)/dur);
      const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

      // 嵐パーティクル
      if(stormMeshRef) stormMeshRef.material.opacity=stormStart+(stormEnd-stormStart)*e;

      // 霧
      if(surfaceScene.fog){
        surfaceScene.fog.near=fogNearStart+(fogNearEnd-fogNearStart)*e;
        surfaceScene.fog.far =fogFarStart +(fogFarEnd -fogFarStart)*e;
        surfaceScene.fog.color.lerp(fogColorEnd, e*.05); // ゆっくり変色
      }

      // リング帯 opacity
      if(ringGroupRef){
        ringGroupRef.children.forEach(child=>{
          if(!child.material) return;
          const tgt=child.material.userData.targetOpacity??0;
          child.material.opacity = on ? tgt*e : tgt*(1-e);
        });
      }

      if(t<1){ calmAnimId=requestAnimationFrame(tween); }
      else if(on){
        // 完了後スカイドームを差し替え
        if(ringGroupRef&&ringGroupRef.userData.makeSaturnSkyTex&&ringGroupRef.userData.skyDomeRef){
          const skyDome=ringGroupRef.userData.skyDomeRef;
          if(skyDome.material){
            skyDome.material.map=ringGroupRef.userData.makeSaturnSkyTex(true);
            skyDome.material.needsUpdate=true;
          }
        }
        // 霧を澄んだ空の色に確定
        if(surfaceScene.fog){surfaceScene.fog.near=80;surfaceScene.fog.far=400;surfaceScene.fog.color.set(0x1a2d6a);}
      } else {
        // 嵐に戻った後スカイドームを嵐に
        if(ringGroupRef&&ringGroupRef.userData.makeSaturnSkyTex&&ringGroupRef.userData.skyDomeRef){
          const skyDome=ringGroupRef.userData.skyDomeRef;
          if(skyDome.material){
            skyDome.material.map=ringGroupRef.userData.makeSaturnSkyTex(false);
            skyDome.material.needsUpdate=true;
          }
        }
        if(surfaceScene.fog){surfaceScene.fog.near=5;surfaceScene.fog.far=45;surfaceScene.fog.color.set(0xb89040);}
      }
    }
    calmAnimId=requestAnimationFrame(tween);
  }

  calmBtn.onclick=()=>{
    calmActive=!calmActive;
    if(calmActive){
      calmBtn.textContent='⛈ 嵐を戻す';
      calmBtn.classList.add('calm-active');
    } else {
      calmBtn.textContent='🌀 嵐を静める & リングを見る';
      calmBtn.classList.remove('calm-active');
    }
    setCalmMode(calmActive);
  };
  document.getElementById('surface').style.transition='opacity .8s';
  setTimeout(()=>document.getElementById('surface').style.opacity='1',50);

  startSurfaceLoop();

  // Surface camera look controls
  const lookUp=document.getElementById('look-up'),lookDown=document.getElementById('look-down'),lookLeft=document.getElementById('look-left'),lookRight=document.getElementById('look-right');
  function startLook(dp,dy){
    let raf;const step=()=>{surfacePitch=Math.max(-1.1,Math.min(1.1,surfacePitch+dp));surfaceYaw+=dy;raf=requestAnimationFrame(step);};
    raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  }
  let cancelLook=null;
  [lookUp,lookDown,lookLeft,lookRight].forEach(btn=>{
    btn.addEventListener('mousedown',e=>{if(cancelLook)cancelLook();const[dp,dy]=btn===lookUp?[.02,0]:btn===lookDown?[-.02,0]:btn===lookLeft?[0,-.03]:[0,.03];cancelLook=startLook(dp,dy);});
    btn.addEventListener('touchstart',e=>{e.preventDefault();if(cancelLook)cancelLook();const[dp,dy]=btn===lookUp?[.02,0]:btn===lookDown?[-.02,0]:btn===lookLeft?[0,-.03]:[0,.03];cancelLook=startLook(dp,dy);},{passive:false});
  });
  window.addEventListener('mouseup',()=>{if(cancelLook){cancelLook();cancelLook=null;}});
  window.addEventListener('touchend',()=>{if(cancelLook){cancelLook();cancelLook=null;}});

  // Mouse drag look
  let sdrag=false,smx=0,smy=0;
  document.getElementById('sc').addEventListener('mousedown',e=>{sdrag=true;smx=e.clientX;smy=e.clientY;});
  window.addEventListener('mousemove',e=>{if(!sdrag||!surfaceActive)return;surfaceYaw+=(e.clientX-smx)*.003;surfacePitch=Math.max(-1.1,Math.min(1.1,surfacePitch-(e.clientY-smy)*.003));smx=e.clientX;smy=e.clientY;});
  window.addEventListener('mouseup',()=>sdrag=false);
}

let surfaceAnimId=null;
function startSurfaceLoop(){
  function loop(){
    if(!surfaceActive)return;
    surfaceAnimId=requestAnimationFrame(loop);
    const dt=surfaceClock?surfaceClock.getDelta():.016;

    // Apply camera rotation
    surfaceCamera.rotation.set(surfacePitch,surfaceYaw,0,'YXZ');

    // Animate dust/particles
    const now2=Date.now();
    surfaceMeshes.forEach(m=>{
      // Saturn storm: swirling horizontal drift
      if(m.userData&&m.userData.isSaturnStorm){
        m.rotation.y+=dt*.18;
        m.position.y=Math.sin(now2*.0004)*.3;
      } else if(m.isPoints){
        m.position.x+=Math.sin(now2*.0003+m.id)*.003;
        m.position.y+=Math.sin(now2*.0007+m.id*.5)*.001;
      }
      if(m.isMesh&&m.geometry&&m.geometry.type==='TorusGeometry')m.rotation.z+=dt*.001;
    });

    surfaceRenderer.render(surfaceScene,surfaceCamera);
  }
  loop();
}

function exitSurface(){
  surfaceActive=false;
  if(surfaceAnimId)cancelAnimationFrame(surfaceAnimId);
  document.getElementById('surface').style.transition='opacity .6s';
  document.getElementById('surface').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('surface').style.display='none';
    // Dispose surface meshes
    surfaceMeshes.forEach(m=>{if(m.geometry)m.geometry.dispose();if(m.material)m.material.dispose();});
    surfaceMeshes=[];
    if(surfaceScene){while(surfaceScene.children.length)surfaceScene.remove(surfaceScene.children[0]);}
    document.getElementById('saturn-calm-btn').style.display='none';
    // Restore UI
    document.getElementById('ui').style.opacity='1';document.getElementById('legend').style.opacity='1';document.getElementById('hint').style.opacity='1';
    paused=false;landingActive=false;
  },700);
}
document.getElementById('back-btn').addEventListener('click',exitSurface);

// ═══════════════════════════════════════════════════════════════════════════
// MAIN SOLAR SYSTEM LOOP
// ═══════════════════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  if(surfaceActive)return;
  const dt=Math.min(clock.getDelta(),.1);
  if(!paused){
    sunMesh.rotation.y+=dt*simSpeed*.008;
    PDATA.forEach((pd,i)=>{
      orbitAngles[i]+=(2*Math.PI/(pd.period*.8))*dt*simSpeed;
      planetMeshes[i].position.set(Math.cos(orbitAngles[i])*pd.orbitR,0,Math.sin(orbitAngles[i])*pd.orbitR);
      planetMeshes[i].rotation.y+=selfRotSpeeds[i]*simSpeed*(i===1?-1:1);
      planetMeshes[i].children.forEach(ch=>{if(ch.userData&&ch.userData.isCloud)ch.rotation.y+=.0005*simSpeed;});
    });
  }
  renderer.render(scene,camera);
}

setTimeout(()=>{document.getElementById('loading').style.display='none';animate();},200);
</script>
